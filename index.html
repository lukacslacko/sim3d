<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>sim3d — block affinity playground</title>
<style>
  html, body { margin: 0; height: 100%; background: #0a0d12; color: #cfd6e0;
    font: 13px/1.4 ui-sans-serif, system-ui, sans-serif; overflow: hidden; }
  #ui { position: fixed; top: 10px; left: 10px; padding: 10px 12px;
    background: rgba(15,20,28,0.78); border: 1px solid #25303d; border-radius: 6px;
    backdrop-filter: blur(6px); min-width: 280px; max-height: calc(100vh - 310px);
    overflow-y: auto; }
  /* Direction histogram panel — below the UI on the left, above #stats. */
  #histPanel { position: fixed; left: 10px; bottom: 40px; width: 240px;
    padding: 8px 10px; background: rgba(15,20,28,0.78);
    border: 1px solid #25303d; border-radius: 6px; backdrop-filter: blur(6px);
    display: flex; flex-direction: column; }
  #histPanel h2 { font-size: 11px; margin: 0 0 6px; color: #9ad8ff;
    letter-spacing: .04em; font-weight: normal; }
  #histCanvas { display: block; width: 220px; height: 220px;
    background: transparent; }
  #ui h1 { font-size: 13px; margin: 0 0 6px; letter-spacing: .04em; color: #9ad8ff; }
  #ui label { display: flex; justify-content: space-between; gap: 8px;
    align-items: center; margin: 4px 0; }
  #ui input[type=range] { width: 110px; }
  #ui input[type=number] { width: 70px; background: #1a222d; color: #cfd6e0;
    border: 1px solid #2a3543; border-radius: 3px; padding: 1px 4px; }
  #ui button { background: #1f2a36; color: #cfd6e0; border: 1px solid #2a3543;
    padding: 4px 9px; border-radius: 4px; cursor: pointer; margin-right: 4px; }
  #ui button:hover { background: #283544; }
  #ui .row { margin-top: 6px; }
  #ui hr { border: none; border-top: 1px solid #25303d; margin: 7px 0; }
  #stats { position: fixed; bottom: 10px; left: 10px; padding: 6px 9px;
    background: rgba(15,20,28,0.78); border: 1px solid #25303d; border-radius: 4px;
    font-variant-numeric: tabular-nums; }
  #help { position: fixed; bottom: 10px; right: 10px; padding: 6px 9px;
    background: rgba(15,20,28,0.78); border: 1px solid #25303d; border-radius: 4px;
    color: #7a8696; }
</style>
</head>
<body>

<div id="ui">
  <h1>SIM3D — block affinity</h1>
  <label title="Which block-type configuration is active. Switching rebuilds blocks.&#10;&#10;sheet: single block type with orientation-rich affinity.&#10;head_tail: 2-block chains (head ↔ tail). Pair params: head_head_*, tail_tail_*, unbonded_ht_attraction.&#10;head_body_tail: 3-block chains (head ↔ body ↔ tail). 6 unbonded pair types — hbt_{hh,bb,tt,hb,ht,bt}_* — each with its own distance/repulsion/attraction.&#10;head_tail_water: head_tail + a third bondless, orientation-blind 'water' type. Three water pair models (W↔W, W↔H, W↔T). Two count sliders: nMolecules (head+tail pairs) and nWaters.">config <select id="config">
    <option value="sheet">sheet</option>
    <option value="head_tail">head_tail</option>
    <option value="head_body_tail">head_body_tail</option>
    <option value="head_tail_water">head_tail_water</option>
  </select></label>
  <hr>
  <label class="blocks-single" title="Total number of blocks. In head_tail mode the first half become heads and the second half tails (so an even count makes equal numbers of each).">blocks <input id="nBlocks" type="number" min="1" max="10000" step="1" value="2000"></label>
  <label class="blocks-htw" title="Number of head-tail molecules in head_tail_water (each molecule = 1 head + 1 tail = 2 blocks). Total block count = 2·molecules + waters.">molecules <input id="nMolecules" type="number" min="0" max="5000" step="1" value="800"></label>
  <label class="blocks-htw" title="Number of bondless water blocks in head_tail_water. Waters are orientation-blind and only feel the htw_w*_* pair forces.">waters <input id="nWaters" type="number" min="0" max="10000" step="1" value="1000"></label>
  <label title="Container shape.&#10;&#10;sphere: inward radial wall force (wallK) keeps blocks inside a ball of radius sphere R.&#10;cube (wrapping): periodic boundary conditions on a cube of edge cubeSize. Anything leaving one face reappears on the opposite face; pair forces use the minimum-image displacement so blocks interact across faces too. No wallK is applied. Pick cubeSize as an integer multiple of cutoff (default 18 / 3 = 6 cells per axis).">container <select id="container">
    <option value="cube">cube (wrapping)</option>
    <option value="sphere">sphere</option>
  </select></label>
  <label class="container-sphere" title="Radius of the spherical container. Blocks are pushed inward from the wall.">sphere R <input id="sphereR" type="number" min="2" max="40" step="0.5" value="9"></label>
  <label class="container-cube" title="Edge length of the periodic cube. Pick this as an integer multiple of cutoff (default 18 / 3 = 6 cells/axis); it must be at least 3·cutoff for the spatial-hash neighbor search to remain correct under wrap.">cube size <input id="cubeSize" type="number" min="3" max="200" step="0.5" value="18"></label>
  <label title="Pair-interaction cutoff distance. Pairs farther apart than this contribute zero force/torque (with a smooth taper between cutoff/2 and cutoff). Bonded H-T pairs ignore this — bonds always pull.">cutoff <input id="cutoff" type="number" min="0.1" step="0.1" value="3.0"></label>
  <hr>
  <div class="cfg-sheet">
    <label title="Equilibrium spacing for in-plane neighbors — the well's center along the displacement axis.">d_peak <input id="d_peak" type="number" step="0.05" value="0.5"></label>
    <label title="−1/d coefficient for in-plane displacements. Should be NEGATIVE for an actual repulsive core.">in-plane rep <input id="in_plane_repulsion" type="number" step="0.1" value="-0.6"></label>
    <label title="−1/d coefficient for stacked displacements. Should be NEGATIVE for an actual repulsive core.">ortho rep <input id="orthogonal_repulsion" type="number" step="0.1" value="-0.1"></label>
    <label title="Attraction term coefficient. NEGATIVE for an attractive well at d_peak (so flat sheets form).">attraction <input id="attraction" type="number" step="0.1" value="0"></label>
    <label title="Intrinsic plane-bend angle in radians. Each block's plane tilts by this much, so flat sheets curl into bowls/shells with curvature ≈ bend.">bend (rad) <input id="bend" type="number" step="0.01" value="0"></label>
    <hr>
  </div>
  <div class="cfg-bonded">
    <label title="Preferred separation between two bonded blocks (H↔T in head_tail; H↔B and B↔T in head_body_tail). The 'a' parameter in U = −rep/d + att/(1+(d−a)²) for each bond.">bond distance <input id="bond_distance" type="number" step="0.05" value="0.4"></label>
    <label title="Short-range repulsion strength for bonded pairs (the −rep/d term). NEGATIVE → −rep/d × negative = +positive/d, an actual repulsive core that prevents overlap.">bond repulsion <input id="bond_repulsion" type="number" step="0.1" value="0"></label>
    <label title="Attractive well depth at the bond distance. NEGATIVE → energy minimum near d = bond distance (more negative = deeper well).">bond attraction <input id="bond_attraction" type="number" step="0.1" value="-200"></label>
    <label title="Torque on each bonded block to align its normal with bond_dir (= inner→outer = tail→head direction). Higher = faster alignment. In head_body_tail, both bonds align all three blocks the same way (tail→head).">bond alignment torque <input id="bond_alignment_torque" type="number" step="0.1" value="20"></label>
    <label title="Exponent k on the alignment factor used by every (1+cos θ)/2 attraction in this config: cf = ((1 + n_a·n_b)/2)^k. Applies to head_tail's HH and TT, and to ALL 6 head_body_tail pair types (HH, BB, TT, HB, HT, BT). k=1 is the historical linear factor. k>1 sharpens — only nearly-parallel pairs feel the attractive well, off-axis ones get only the bare repulsion. k<1 makes attraction more permissive. Antiparallel always gives cf=0.">alignment exponent <input id="alignment_exponent" type="number" min="0" step="0.1" value="5"></label>
  </div>
  <div class="cfg-head_tail">
    <label title="Preferred distance between two heads (always unbonded — bonds only exist H↔T in this config).">H–H distance <input id="head_head_distance" type="number" step="0.05" value="0.9"></label>
    <label title="Short-range repulsion between two heads. NEGATIVE for actual repulsion.">H–H repulsion <input id="head_head_repulsion" type="number" step="0.1" value="-0.1"></label>
    <label title="Attraction between two heads. NEGATIVE for an attractive well. Multiplied by (1 + n_a·n_b)/2 — parallel heads fully attract, antiparallel ones repel (bare repulsion wins).">H–H attraction <input id="head_head_attraction" type="number" step="0.1" value="0"></label>
    <label title="Preferred distance between two tails.">T–T distance <input id="tail_tail_distance" type="number" step="0.05" value="0.5"></label>
    <label title="Short-range repulsion between two tails. NEGATIVE for actual repulsion.">T–T repulsion <input id="tail_tail_repulsion" type="number" step="0.1" value="0"></label>
    <label title="Attraction between two tails. NEGATIVE for an attractive well. Multiplied by (1 + n_a·n_b)/2 — parallel tails fully attract, antiparallel ones repel.">T–T attraction <input id="tail_tail_attraction" type="number" step="0.1" value="-0.15"></label>
    <label title="Pure −k/d attraction between an unbonded head and tail. No equilibrium distance — they just pull each other in until H–H or T–T repulsion stops them. Set to 0 to disable.">unbonded H–T attraction <input id="unbonded_ht_attraction" type="number" step="0.1" value="0"></label>
    <hr>
  </div>
  <div class="cfg-hbt">
    <label title="head↔head distance. Want-distance form U = −rep/d + (1+cos θ)/2 · att / (1 + (d − distance)²).">H–H distance <input id="hbt_hh_distance" type="number" step="0.05" value="0.8"></label>
    <label title="head↔head short-range repulsion. NEGATIVE for actual core repulsion (e.g. to spread heads on a surface).">H–H repulsion <input id="hbt_hh_repulsion" type="number" step="0.1" value="-0.1"></label>
    <label title="head↔head attractive well depth at H–H distance. NEGATIVE for actual attraction. Multiplied by (1 + n_a·n_b)/2 — parallel-aligned heads attract, antiparallel ones get no attraction.">H–H attraction <input id="hbt_hh_attraction" type="number" step="0.1" value="-0.3"></label>
    <label title="body↔body distance. Bodies pack the bulk of the structure.">B–B distance <input id="hbt_bb_distance" type="number" step="0.05" value="0.8"></label>
    <label title="body↔body short-range repulsion. NEGATIVE for actual core repulsion.">B–B repulsion <input id="hbt_bb_repulsion" type="number" step="0.1" value="0"></label>
    <label title="body↔body attractive well at B–B distance. NEGATIVE for attraction. (1+cos θ)/2 factor — bodies stack better when their normals are aligned.">B–B attraction <input id="hbt_bb_attraction" type="number" step="0.1" value="-0.7"></label>
    <label title="tail↔tail distance.">T–T distance <input id="hbt_tt_distance" type="number" step="0.05" value="0.8"></label>
    <label title="tail↔tail short-range repulsion. NEGATIVE for actual core repulsion (e.g. to spread tails on the inner surface).">T–T repulsion <input id="hbt_tt_repulsion" type="number" step="0.1" value="-0.1"></label>
    <label title="tail↔tail attractive well at T–T distance. NEGATIVE for attraction; (1+cos θ)/2 factor.">T–T attraction <input id="hbt_tt_attraction" type="number" step="0.1" value="-0.3"></label>
    <label title="head↔body distance (between blocks NOT bonded together; their bonds are handled separately).">H–B distance <input id="hbt_hb_distance" type="number" step="0.05" value="0.5"></label>
    <label title="head↔body short-range repulsion. NEGATIVE for core repulsion.">H–B repulsion <input id="hbt_hb_repulsion" type="number" step="0.1" value="-0.2"></label>
    <label title="head↔body attractive well. NEGATIVE for attraction; (1+cos θ)/2 factor.">H–B attraction <input id="hbt_hb_attraction" type="number" step="0.1" value="0"></label>
    <label title="head↔tail distance — INTRA-CHAIN ONLY. Only the head and tail of the same molecule (sharing a body) interact via these params; heads and tails in different chains feel nothing from each other.">H–T distance (same chain) <input id="hbt_ht_distance" type="number" step="0.05" value="0.9"></label>
    <label title="head↔tail short-range repulsion — INTRA-CHAIN ONLY. NEGATIVE for actual repulsion. Useful to push the head and tail of a chain apart so it stays straight.">H–T repulsion (same chain) <input id="hbt_ht_repulsion" type="number" step="0.1" value="-3"></label>
    <label title="head↔tail attractive well — INTRA-CHAIN ONLY. NEGATIVE for attraction; (1+cos θ)/2 factor.">H–T attraction (same chain) <input id="hbt_ht_attraction" type="number" step="0.1" value="0"></label>
    <label title="body↔tail distance (between blocks NOT bonded together).">B–T distance <input id="hbt_bt_distance" type="number" step="0.05" value="0.5"></label>
    <label title="body↔tail short-range repulsion. NEGATIVE for core repulsion.">B–T repulsion <input id="hbt_bt_repulsion" type="number" step="0.1" value="-0.2"></label>
    <label title="body↔tail attractive well. NEGATIVE for attraction; (1+cos θ)/2 factor.">B–T attraction <input id="hbt_bt_attraction" type="number" step="0.1" value="0"></label>
    <hr>
  </div>
  <div class="cfg-htw">
    <label title="water↔water preferred distance. Form U = −rep/d + att/(1+(d−distance)²). NO (1+cos θ)/2 factor — water doesn't care about orientation, and water blocks receive no torque from any pair.">W–W distance <input id="htw_ww_distance" type="number" step="0.05" value="0.5"></label>
    <label title="water↔water short-range repulsion. NEGATIVE for actual core repulsion (waters can't overlap).">W–W repulsion <input id="htw_ww_repulsion" type="number" step="0.05" value="-0.1"></label>
    <label title="water↔water attractive well. NEGATIVE for attraction (water self-cohesion — bulk water phase). The well minimum sits at W–W distance only when W–W repulsion = 0; nonzero repulsion shifts it outward.">W–W attraction <input id="htw_ww_attraction" type="number" step="0.05" value="0"></label>
    <label title="water↔head preferred distance.">W–H distance <input id="htw_wh_distance" type="number" step="0.05" value="0.3"></label>
    <label title="water↔head short-range repulsion. NEGATIVE for core repulsion.">W–H repulsion <input id="htw_wh_repulsion" type="number" step="0.05" value="0"></label>
    <label title="water↔head attractive well depth. NEGATIVE for attraction (hydrophilic head). Set to 0 for indifferent.">W–H attraction <input id="htw_wh_attraction" type="number" step="0.05" value="-0.8"></label>
    <label title="water↔tail preferred distance.">W–T distance <input id="htw_wt_distance" type="number" step="0.05" value="0.5"></label>
    <label title="water↔tail short-range repulsion. NEGATIVE for core repulsion (hydrophobic — water pushes tail away). With attraction=0 and a strong negative repulsion you get classic surfactant behavior: tails flee water, heads love it → micelles/bilayers.">W–T repulsion <input id="htw_wt_repulsion" type="number" step="0.05" value="-0.5"></label>
    <label title="water↔tail attractive well depth. NEGATIVE for attraction. Usually 0 for hydrophobic tails.">W–T attraction <input id="htw_wt_attraction" type="number" step="0.05" value="0"></label>
    <hr>
  </div>
  <label title="Time-step multiplier. The base step is 0.04; this scales it. Higher = faster simulation but less stable.">dt × <input id="dtMul" type="range" min="0.05" max="3" step="0.05" value="1"></label>
  <label title="Velocity damping per step. Closer to 1 = less dissipation (closer to free dynamics). Closer to 0.5 = heavily overdamped.">damping <input id="damping" type="range" min="0.5" max="0.999" step="0.001" value="0.973"></label>
  <label class="container-sphere" title="Strength of the inward push from the sphere wall. Higher = blocks held closer to the center. Not used by the cube container, which is periodic.">wall k <input id="wallK" type="number" step="0.1" value="0.1"></label>
  <label title="Hard upper bound on per-block force/torque magnitudes (each step). Stops singularities (pairs at ~zero distance) from blowing up the integrator.">force cap <input id="fCap" type="number" step="1" value="50"></label>
  <div class="row">
    <button id="resetBtn">reset</button>
    <button id="pauseBtn">pause</button>
    <button id="kickBtn">jiggle</button>
  </div>
</div>

<div id="histPanel">
  <h2>direction histogram</h2>
  <canvas id="histCanvas"></canvas>
</div>

<div id="stats"></div>
<div id="help">drag = orbit · scroll = zoom · right-drag = pan</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
// Cache-bust the physics module so a stale browser-cached copy can't
// silently mismatch this index.html (e.g. param renames where the spread
// of DEFAULTS would otherwise be missing keys → NaN mesh scales). Bump
// this number whenever physics.mjs changes its public surface.
import {
  DEFAULTS, makeBlock, stepBlocks, refreshNormal,
  setupHeadTail, setupHeadBodyTail, setupHeadTailWater,
  randomQuat, randomPointInBall, randomPointInBox,
} from './physics.mjs?v=15';

// ---------------------------------------------------------------------------
// Parameters: live state, mirrors the controls in #ui. Physics module reads
// straight off this object every step, so editing a control updates behavior
// instantly.
// ---------------------------------------------------------------------------
const params = {
  ...DEFAULTS,
  nBlocks: 2000,
  nMolecules: 800,
  nWaters: 1000,
  dtMul: 1,
};

let blocks = [];
let scene, camera, renderer, controls, sphereMesh;
let hexGeo, hexMat, headGeo, tailGeo, waterGeo, waterMat;
let paused = false;

// ── Direction histogram state ───────────────────────────────────────────────
// A small icosahedron under the UI: each face = one bin, colored AND radially
// extruded by how many blocks have their normal closest to that face's
// centroid direction. Subdivision 3 → 1280 faces (vs 320 at subdiv 2). The
// mesh is non-indexed (one triplet of vertices per face), which is what the
// PolyhedronGeometry base class produces — so per-face coloring is just
// "write the same RGB to vertices [3f, 3f+1, 3f+2]" and per-face radial lift
// is "scale the same 3 vertices uniformly". Because vertices are duplicated
// per face, neighboring bins lifted to different heights leave visible
// vertical edges between them — that's the bar-chart-on-a-sphere look.
let histRenderer, histScene, histCamera, histGeom, histColors;
let histFaceNormals;          // Float32Array length 3·faceCount of unit centroid dirs
let histCounts;               // Uint32Array length faceCount, reused each frame
let histOrigPos;              // Float32Array snapshot of the unit-sphere positions
let histFaceHeights;          // Float32Array length faceCount: each bin's lift radius
// Wall mesh: bridges every shared icosahedron edge between two adjacent bins
// of (possibly) different heights. Without this, each lifted plateau floats
// in midair; with it, the histogram becomes a connected stepped surface.
let histUnitDirs;             // Float32Array 3·V of unique unit vertex dirs
let histWallEdges;            // Uint32Array 4·E: [vA, vB, faceLo, faceHi] per edge
let histWallGeom, histWallPos, histWallCol;
const HIST_SUBDIV = 3;
const HIST_RADIUS_BOOST = 0.6;   // max-density bin extrudes to radius 1 + boost
const _histColor = new THREE.Color();

// Map a block's normal vector to RGB using |n| = (|x|, |y|, |z|). The hex
// sheet is front/back symmetric (n and -n are the same pose), so taking the
// absolute value is the right choice: a closed shell gets one continuous
// color gradient across its surface instead of two opposite-color halves.
// Equivalence class of opposite normals → same color, otherwise smooth.
function applyColorFromNormal(mat, n) {
  mat.color.setRGB(Math.abs(n[0]), Math.abs(n[1]), Math.abs(n[2]));
}

function buildScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0d12);
  scene.fog = new THREE.Fog(0x0a0d12, 25, 80);

  camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 500);
  camera.position.set(0, 6, 22);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  scene.add(new THREE.AmbientLight(0xffffff, 0.35));
  const key = new THREE.DirectionalLight(0xffffff, 0.9);
  key.position.set(5, 10, 7); scene.add(key);
  const rim = new THREE.DirectionalLight(0x88aaff, 0.4);
  rim.position.set(-6, -3, -8); scene.add(rim);

  // ── 'sheet' geometry: thin hex prism, axis = local Z (rotated from default Y).
  hexGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.08, 6);
  hexGeo.rotateX(Math.PI / 2);
  // ── 'head_tail' geometry: head = flat cuboid (face ⊥ direction); tail =
  // long cuboid (length ‖ direction). BoxGeometry's third axis is depth = Z,
  // which equals each block's local "direction" axis after quaternion rotate.
  headGeo = new THREE.BoxGeometry(1.0, 1.0, 0.15);     // wide × wide × thin
  tailGeo = new THREE.BoxGeometry(0.18, 0.18, 1.6);    // thin × thin × long
  // ── 'head_tail_water' water geometry: small sphere — orientation-blind.
  waterGeo = new THREE.SphereGeometry(0.5, 10, 8);
  // Single material prototype reused for every block in every config.
  // applyColorFromNormal() sets the per-block color (cloned material) based
  // on the block's pose direction, the same way for sheet/head/tail.
  hexMat = new THREE.MeshStandardMaterial({
    color: 0x7fbcff, metalness: 0.1, roughness: 0.55,
    side: THREE.DoubleSide,
  });
  // Water material: shared across every water block (no per-block color
  // update). Half-translucent white so heads/tails are visible through the
  // water shell. depthWrite=false so overlapping water spheres don't stack
  // up depth-buffer artifacts on each other.
  waterMat = new THREE.MeshStandardMaterial({
    color: 0xffffff, metalness: 0.0, roughness: 0.6,
    transparent: true, opacity: 0.5, depthWrite: false,
  });

  rebuildContainer();
  rebuildBlocks();
}

// Build the small mini-renderer + scene for the direction histogram. Called
// once at startup. Lights are deliberately gentle (mostly ambient) so the
// per-face vertex colors carry the visual signal rather than shading.
function buildHistogram() {
  const canvas = document.getElementById('histCanvas');
  const w = canvas.clientWidth || 220, h = canvas.clientHeight || 220;
  histRenderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  histRenderer.setPixelRatio(devicePixelRatio);
  histRenderer.setSize(w, h, false);

  histScene = new THREE.Scene();
  // FOV/distance picked so the fully-extruded sphere (radius 1+HIST_RADIUS_BOOST)
  // fits with margin. syncHistCamera mirrors the same distance.
  histCamera = new THREE.PerspectiveCamera(45, w / h, 0.1, 20);
  histCamera.position.set(0, 0, 4.5);
  histCamera.lookAt(0, 0, 0);

  histScene.add(new THREE.AmbientLight(0xffffff, 0.85));
  const dl = new THREE.DirectionalLight(0xffffff, 0.35);
  dl.position.set(2, 3, 4); histScene.add(dl);

  histGeom = new THREE.IcosahedronGeometry(1, HIST_SUBDIV);
  // PolyhedronGeometry produces a non-indexed BufferGeometry: positions are
  // 3 vertices per face in source order. Precompute each face's centroid
  // direction so we can bin block normals by argmax dot-product.
  const posAttr = histGeom.attributes.position;
  const faceCount = posAttr.count / 3;
  histFaceNormals = new Float32Array(faceCount * 3);
  const pa = posAttr.array;
  for (let f = 0; f < faceCount; f++) {
    const i = f * 9;
    let cx = (pa[i  ] + pa[i+3] + pa[i+6]) / 3;
    let cy = (pa[i+1] + pa[i+4] + pa[i+7]) / 3;
    let cz = (pa[i+2] + pa[i+5] + pa[i+8]) / 3;
    const inv = 1 / Math.hypot(cx, cy, cz);
    histFaceNormals[f*3]     = cx * inv;
    histFaceNormals[f*3 + 1] = cy * inv;
    histFaceNormals[f*3 + 2] = cz * inv;
  }
  histColors = new Float32Array(posAttr.count * 3);
  histGeom.setAttribute('color', new THREE.BufferAttribute(histColors, 3));
  histCounts = new Uint32Array(faceCount);
  histFaceHeights = new Float32Array(faceCount);
  // Snapshot the unit-sphere positions so we can re-derive each face's lifted
  // vertex positions from scratch every frame: lifted = unit · (1 + boost·t).
  histOrigPos = posAttr.array.slice();

  const mat = new THREE.MeshStandardMaterial({
    vertexColors: true, roughness: 0.65, metalness: 0.0, flatShading: true,
  });
  const sphereMesh = new THREE.Mesh(histGeom, mat);
  sphereMesh.frustumCulled = false;     // bounding sphere = unit; lifts go past it
  histScene.add(sphereMesh);
  // Subtle wire overlay so adjacent bins stay distinguishable when they have
  // similar colors (otherwise low-density regions look like one blob). Shares
  // the geometry, so the wires lift with their faces — gives each extruded
  // patch a clean dark outline on top of every bin.
  const wireMesh = new THREE.Mesh(histGeom, new THREE.MeshBasicMaterial({
    color: 0x000000, wireframe: true, transparent: true, opacity: 0.18,
  }));
  wireMesh.frustumCulled = false;
  histScene.add(wireMesh);

  // ── Walls ────────────────────────────────────────────────────────────────
  // Build vertex deduplication + edge adjacency once. PolyhedronGeometry
  // produces non-indexed buffers (each face has its own copy of every
  // vertex); for walls we need to know which two faces share each unique
  // edge so we can bridge their (potentially different) heights.
  const dedup = _dedupHistVertices(posAttr.array);
  histUnitDirs = dedup.uniqueDirs;
  histWallEdges = _buildHistEdges(dedup.faceVerts, faceCount);
  const edgeCount = histWallEdges.length / 4;
  // 6 verts per edge (two triangles forming a quad), 3 floats per vert.
  histWallPos = new Float32Array(edgeCount * 18);
  histWallCol = new Float32Array(edgeCount * 18);
  histWallGeom = new THREE.BufferGeometry();
  histWallGeom.setAttribute('position', new THREE.BufferAttribute(histWallPos, 3));
  histWallGeom.setAttribute('color', new THREE.BufferAttribute(histWallCol, 3));
  // DoubleSide so walls are visible no matter which way the camera approaches
  // (winding here is consistent but not always outward-facing on a sphere).
  const wallMat = new THREE.MeshStandardMaterial({
    vertexColors: true, side: THREE.DoubleSide,
    roughness: 0.7, metalness: 0.0, flatShading: true,
  });
  const wallMesh = new THREE.Mesh(histWallGeom, wallMat);
  wallMesh.frustumCulled = false;
  histScene.add(wallMesh);
}

// Dedup vertices of a non-indexed BufferGeometry by exact-coordinate hash
// (rounded to 5 decimals to swallow subdivision float wobble). Returns
// { uniqueDirs: Float32Array 3·V, faceVerts: Uint16Array length = posCount/3 }
// where each entry of faceVerts is the unique-vertex index for the
// corresponding entry of the original positions array.
function _dedupHistVertices(positions) {
  const map = new Map();
  const dirs = [];
  const faceVerts = new Uint16Array(positions.length / 3);
  for (let i = 0; i < positions.length; i += 3) {
    const x = positions[i], y = positions[i+1], z = positions[i+2];
    const key = x.toFixed(5) + ',' + y.toFixed(5) + ',' + z.toFixed(5);
    let idx = map.get(key);
    if (idx === undefined) {
      idx = dirs.length / 3;
      dirs.push(x, y, z);
      map.set(key, idx);
    }
    faceVerts[i / 3] = idx;
  }
  return { uniqueDirs: new Float32Array(dirs), faceVerts };
}

// For each undirected edge (vA, vB) shared by two faces in a closed mesh,
// emit a 4-tuple [vA, vB, f1, f2]. Closed icosahedron → every edge has
// exactly two adjacent faces. Edge key packs {lo, hi} as lo·100000 + hi
// (V ≤ 642 at subdiv=3, so 100000 is plenty of headroom).
function _buildHistEdges(faceVerts, faceCount) {
  const edgeMap = new Map();
  for (let f = 0; f < faceCount; f++) {
    const v0 = faceVerts[3*f], v1 = faceVerts[3*f+1], v2 = faceVerts[3*f+2];
    const pairs = [[v0, v1], [v1, v2], [v2, v0]];
    for (const [a, b] of pairs) {
      const lo = a < b ? a : b, hi = a < b ? b : a;
      const key = lo * 100000 + hi;
      const existing = edgeMap.get(key);
      if (existing === undefined) edgeMap.set(key, [f, -1]);
      else existing[1] = f;
    }
  }
  const out = [];
  for (const [key, [f1, f2]] of edgeMap) {
    if (f2 === -1) continue;          // boundary edge (shouldn't happen for icosa)
    const lo = (key / 100000) | 0, hi = key % 100000;
    out.push(lo, hi, f1, f2);
  }
  return new Uint32Array(out);
}

// Bin every block's normal into the closest face by max dot-product, then
// rewrite the vertex-color buffer with a hue ramp keyed to count/maxCount.
// Water blocks (orientation-blind, never receive torque) are skipped: their
// quaternion stays at its random initial value, which would just smear a
// uniform background over the structured head/tail signal.
function updateHistogram() {
  const faceCount = histCounts.length;
  for (let f = 0; f < faceCount; f++) histCounts[f] = 0;

  const skipWater = params.config === 'head_tail_water';
  for (let bi = 0; bi < blocks.length; bi++) {
    const b = blocks[bi];
    if (skipWater && b.type === 2) continue;
    const nx = b.normal[0], ny = b.normal[1], nz = b.normal[2];
    let bestF = 0, bestDot = -2;
    for (let f = 0; f < faceCount; f++) {
      const fi = f * 3;
      const dot = nx * histFaceNormals[fi]
                + ny * histFaceNormals[fi + 1]
                + nz * histFaceNormals[fi + 2];
      if (dot > bestDot) { bestDot = dot; bestF = f; }
    }
    histCounts[bestF]++;
  }

  // Normalize. maxCount=1 fallback keeps an empty histogram from dividing by
  // zero and turning every face into NaN.
  let maxCount = 1;
  for (let f = 0; f < faceCount; f++) {
    if (histCounts[f] > maxCount) maxCount = histCounts[f];
  }
  const inv = 1 / maxCount;
  const posArr = histGeom.attributes.position.array;
  for (let f = 0; f < faceCount; f++) {
    const t = histCounts[f] * inv;
    // Hue blue (0.66) → red (0.0) as density rises; lightness ramps up too
    // so empty bins read as dark and dense bins as bright.
    _histColor.setHSL(0.66 * (1 - t), 0.85, 0.18 + 0.42 * t);
    const r = _histColor.r, g = _histColor.g, bl = _histColor.b;
    const ci = f * 9;
    histColors[ci    ] = r; histColors[ci + 1] = g; histColors[ci + 2] = bl;
    histColors[ci + 3] = r; histColors[ci + 4] = g; histColors[ci + 5] = bl;
    histColors[ci + 6] = r; histColors[ci + 7] = g; histColors[ci + 8] = bl;
    // Radial extrusion: scale the 3 unit-sphere vertices uniformly outward
    // by (1 + boost·t). Same scale on all 3 keeps the face a flat patch (its
    // normal direction is unchanged), just translated outward.
    const h = 1 + HIST_RADIUS_BOOST * t;
    histFaceHeights[f] = h;
    posArr[ci    ] = histOrigPos[ci    ] * h;
    posArr[ci + 1] = histOrigPos[ci + 1] * h;
    posArr[ci + 2] = histOrigPos[ci + 2] * h;
    posArr[ci + 3] = histOrigPos[ci + 3] * h;
    posArr[ci + 4] = histOrigPos[ci + 4] * h;
    posArr[ci + 5] = histOrigPos[ci + 5] * h;
    posArr[ci + 6] = histOrigPos[ci + 6] * h;
    posArr[ci + 7] = histOrigPos[ci + 7] * h;
    posArr[ci + 8] = histOrigPos[ci + 8] * h;
  }
  histGeom.attributes.color.needsUpdate = true;
  histGeom.attributes.position.needsUpdate = true;

  // Walls: bridge the height step between every pair of adjacent bins. For
  // each shared edge (vA, vB), build a quad spanning between the lower
  // bin's height and the higher bin's height, colored to match the higher
  // bin (so a tall red bin appears as a connected solid red column down to
  // its shorter neighbour, the standard 3D-bar-chart look).
  const edgeCount = histWallEdges.length / 4;
  for (let e = 0; e < edgeCount; e++) {
    const ei = e * 4;
    const va = histWallEdges[ei], vb = histWallEdges[ei + 1];
    const f1 = histWallEdges[ei + 2], f2 = histWallEdges[ei + 3];
    const h1 = histFaceHeights[f1], h2 = histFaceHeights[f2];
    const hiF = h1 >= h2 ? f1 : f2;
    const loH = h1 < h2 ? h1 : h2;
    const hiH = h1 > h2 ? h1 : h2;
    const ax = histUnitDirs[3*va],     ay = histUnitDirs[3*va + 1], az = histUnitDirs[3*va + 2];
    const bx = histUnitDirs[3*vb],     by = histUnitDirs[3*vb + 1], bz = histUnitDirs[3*vb + 2];
    const wi = e * 18;
    // Triangle 1: a_lo, b_lo, a_hi
    histWallPos[wi     ] = ax * loH; histWallPos[wi +  1] = ay * loH; histWallPos[wi +  2] = az * loH;
    histWallPos[wi +  3] = bx * loH; histWallPos[wi +  4] = by * loH; histWallPos[wi +  5] = bz * loH;
    histWallPos[wi +  6] = ax * hiH; histWallPos[wi +  7] = ay * hiH; histWallPos[wi +  8] = az * hiH;
    // Triangle 2: b_lo, b_hi, a_hi
    histWallPos[wi +  9] = bx * loH; histWallPos[wi + 10] = by * loH; histWallPos[wi + 11] = bz * loH;
    histWallPos[wi + 12] = bx * hiH; histWallPos[wi + 13] = by * hiH; histWallPos[wi + 14] = bz * hiH;
    histWallPos[wi + 15] = ax * hiH; histWallPos[wi + 16] = ay * hiH; histWallPos[wi + 17] = az * hiH;
    // Color: read the higher face's color from the plateau-color buffer.
    const fci = hiF * 9;
    const r = histColors[fci], g = histColors[fci + 1], bl = histColors[fci + 2];
    for (let v = 0; v < 6; v++) {
      const wci = wi + v * 3;
      histWallCol[wci] = r; histWallCol[wci + 1] = g; histWallCol[wci + 2] = bl;
    }
  }
  histWallGeom.attributes.position.needsUpdate = true;
  histWallGeom.attributes.color.needsUpdate = true;
}

// Keep the histogram view aligned with the main camera so a face on the
// histogram visually corresponds to the same direction as in the main scene.
function syncHistCamera() {
  const len = Math.hypot(camera.position.x, camera.position.y, camera.position.z);
  if (len < 1e-6) return;
  const s = 4.5 / len;
  histCamera.position.set(camera.position.x * s, camera.position.y * s, camera.position.z * s);
  histCamera.up.copy(camera.up);
  histCamera.lookAt(0, 0, 0);
}

function rebuildContainer() {
  if (sphereMesh) scene.remove(sphereMesh);
  if (params.container === 'cube') {
    // Periodic cube: draw the 12 edges only (not a triangulated wireframe)
    // so the boundary stays visually clean.
    const L = params.cubeSize;
    const eg = new THREE.EdgesGeometry(new THREE.BoxGeometry(L, L, L));
    const m = new THREE.LineBasicMaterial({ color: 0x2a3a4f,
      transparent: true, opacity: 0.6 });
    sphereMesh = new THREE.LineSegments(eg, m);
  } else {
    const g = new THREE.SphereGeometry(params.sphereR, 32, 16);
    const m = new THREE.MeshBasicMaterial({ color: 0x2a3a4f, wireframe: true,
      transparent: true, opacity: 0.4 });
    sphereMesh = new THREE.Mesh(g, m);
  }
  scene.add(sphereMesh);
}

function rebuildBlocks() {
  for (const b of blocks) scene.remove(b.mesh);
  blocks = [];
  // head_tail_water uses two sliders (nMolecules + nWaters); other configs
  // use the single nBlocks count.
  const total = params.config === 'head_tail_water'
    ? 2 * params.nMolecules + params.nWaters
    : params.nBlocks;
  // Sphere container: seed inside a ball of 0.9·R so blocks start clear of
  // the wall. Cube container: seed uniformly in the periodic box; no inset
  // needed since there's no wall to push off.
  const seed = params.container === 'cube'
    ? () => randomPointInBox(params.cubeSize)
    : () => randomPointInBall(params.sphereR * 0.9);
  for (let i = 0; i < total; i++) {
    blocks.push(makeBlock(seed(), randomQuat()));
  }
  if (params.config === 'head_tail')       setupHeadTail(blocks, params);
  if (params.config === 'head_body_tail')  setupHeadBodyTail(blocks, params);
  if (params.config === 'head_tail_water') setupHeadTailWater(blocks, params);
  for (const b of blocks) {
    refreshNormal(b);
    let mesh;
    if (params.config === 'head_tail') {
      const mat = hexMat.clone(); applyColorFromNormal(mat, b.normal);
      mesh = new THREE.Mesh(b.type === 0 ? headGeo : tailGeo, mat);
      mesh.scale.setScalar(params.bond_distance ?? 0.6);
    } else if (params.config === 'head_body_tail') {
      const mat = hexMat.clone(); applyColorFromNormal(mat, b.normal);
      mesh = new THREE.Mesh(b.type === 1 ? tailGeo : headGeo, mat);
      mesh.scale.setScalar(params.bond_distance ?? 0.4);
    } else if (params.config === 'head_tail_water') {
      if (b.type === 2) {
        // Water uses the SHARED waterMat (no clone, no per-block color).
        // syncMeshes skips its color update too.
        mesh = new THREE.Mesh(waterGeo, waterMat);
        mesh.scale.setScalar((params.htw_ww_distance ?? 0.5) * 0.5);
      } else {
        const mat = hexMat.clone(); applyColorFromNormal(mat, b.normal);
        mesh = new THREE.Mesh(b.type === 0 ? headGeo : tailGeo, mat);
        mesh.scale.setScalar(params.bond_distance ?? 0.4);
      }
    } else {
      const mat = hexMat.clone(); applyColorFromNormal(mat, b.normal);
      mesh = new THREE.Mesh(hexGeo, mat);
      mesh.scale.setScalar(params.d_peak ?? 0.4);
    }
    mesh.position.set(b.pos[0], b.pos[1], b.pos[2]);
    mesh.quaternion.set(b.quat[0], b.quat[1], b.quat[2], b.quat[3]);
    b.mesh = mesh;
    scene.add(mesh);
  }
  applyConfigVisibility();
}

// Toggle the per-config UI sections so only the active one is visible.
//   .cfg-bonded shows for any config that has bonded chains.
//   .cfg-head_tail covers HH/TT/HT pair params — used by head_tail and
//   head_tail_water (they share the head_tail pair model).
//   .cfg-hbt and .cfg-htw are config-specific.
//   .blocks-single = nBlocks slider; .blocks-htw = nMolecules + nWaters.
function applyConfigVisibility() {
  const c = params.config;
  const isBonded   = (c === 'head_tail' || c === 'head_body_tail' || c === 'head_tail_water');
  const hasHTpairs = (c === 'head_tail' || c === 'head_tail_water');
  for (const el of document.querySelectorAll('.cfg-sheet'))
    el.style.display = c === 'sheet' ? '' : 'none';
  for (const el of document.querySelectorAll('.cfg-bonded'))
    el.style.display = isBonded ? '' : 'none';
  for (const el of document.querySelectorAll('.cfg-head_tail'))
    el.style.display = hasHTpairs ? '' : 'none';
  for (const el of document.querySelectorAll('.cfg-hbt'))
    el.style.display = c === 'head_body_tail' ? '' : 'none';
  for (const el of document.querySelectorAll('.cfg-htw'))
    el.style.display = c === 'head_tail_water' ? '' : 'none';
  for (const el of document.querySelectorAll('.blocks-single'))
    el.style.display = c === 'head_tail_water' ? 'none' : '';
  for (const el of document.querySelectorAll('.blocks-htw'))
    el.style.display = c === 'head_tail_water' ? '' : 'none';
  for (const el of document.querySelectorAll('.container-sphere'))
    el.style.display = params.container === 'sphere' ? '' : 'none';
  for (const el of document.querySelectorAll('.container-cube'))
    el.style.display = params.container === 'cube' ? '' : 'none';
}

// ---------------------------------------------------------------------------
// Main loop & UI wiring.
// ---------------------------------------------------------------------------
const statsEl = document.getElementById('stats');
let frame = 0, fpsTick = performance.now(), fps = 0;
let lastStepStats = { pairsChecked: 0, pairsComputed: 0 };

function syncMeshes() {
  for (const b of blocks) {
    b.mesh.position.set(b.pos[0], b.pos[1], b.pos[2]);
    b.mesh.quaternion.set(b.quat[0], b.quat[1], b.quat[2], b.quat[3]);
    // |normal|→RGB color update for every block whose material reflects its
    // pose direction. Water uses the shared waterMat (translucent white) and
    // we skip it so it stays white instead of getting overwritten per-frame.
    if (b.mesh.material !== waterMat) applyColorFromNormal(b.mesh.material, b.normal);
  }
}

function animate() {
  requestAnimationFrame(animate);
  if (!paused) lastStepStats = stepBlocks(blocks, 0.04 * params.dtMul, params);
  syncMeshes();
  controls.update();
  renderer.render(scene, camera);
  updateHistogram();
  syncHistCamera();
  histRenderer.render(histScene, histCamera);

  frame++;
  const now = performance.now();
  if (now - fpsTick > 500) {
    fps = (frame * 1000 / (now - fpsTick)) | 0;
    frame = 0; fpsTick = now;
    const N = blocks.length;
    const totalPairs = (N * (N - 1) / 2) | 0;
    const fmt = (n) => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'k' : String(n);
    // total pairs · pairs the spatial hash visited · pairs within cutoff (force computed)
    statsEl.textContent =
      `${N} blocks · ${fps} fps · pairs/step  total ${fmt(totalPairs)} · `
      + `checked ${fmt(lastStepStats.pairsChecked)} · `
      + `computed ${fmt(lastStepStats.pairsComputed)}`;
  }
}

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---------------------------------------------------------------------------
// URL persistence: every tunable parameter is mirrored into the query string
// (history.replaceState — no entries piling up in back-stack), and parsed back
// on load. This makes the page state shareable as a URL.
// ---------------------------------------------------------------------------
const URL_KEYS = [
  'config',
  'container', 'cubeSize',
  'nBlocks', 'nMolecules', 'nWaters', 'sphereR', 'cutoff',
  // sheet
  'd_peak', 'in_plane_repulsion', 'orthogonal_repulsion', 'attraction', 'bend',
  // bond params (shared by head_tail and head_body_tail)
  'bond_distance', 'bond_repulsion', 'bond_attraction', 'bond_alignment_torque',
  'alignment_exponent',
  // head_tail-only pair params
  'head_head_distance', 'head_head_repulsion', 'head_head_attraction',
  'tail_tail_distance', 'tail_tail_repulsion', 'tail_tail_attraction',
  'unbonded_ht_attraction',
  // head_body_tail-only pair params (6 unbonded pair types)
  'hbt_hh_distance', 'hbt_hh_repulsion', 'hbt_hh_attraction',
  'hbt_bb_distance', 'hbt_bb_repulsion', 'hbt_bb_attraction',
  'hbt_tt_distance', 'hbt_tt_repulsion', 'hbt_tt_attraction',
  'hbt_hb_distance', 'hbt_hb_repulsion', 'hbt_hb_attraction',
  'hbt_ht_distance', 'hbt_ht_repulsion', 'hbt_ht_attraction',
  'hbt_bt_distance', 'hbt_bt_repulsion', 'hbt_bt_attraction',
  // head_tail_water-only pair params (3 water-related pair types)
  'htw_ww_distance', 'htw_ww_repulsion', 'htw_ww_attraction',
  'htw_wh_distance', 'htw_wh_repulsion', 'htw_wh_attraction',
  'htw_wt_distance', 'htw_wt_repulsion', 'htw_wt_attraction',
  // shared
  'dtMul', 'damping', 'wallK', 'forceCap',
];

function applyURLToParams() {
  const sp = new URLSearchParams(location.search);
  for (const k of URL_KEYS) {
    if (!sp.has(k)) continue;
    const raw = sp.get(k);
    if (k === 'config' || k === 'container') { params[k] = raw; continue; }
    const v = parseFloat(raw);
    if (Number.isFinite(v)) params[k] = v;
  }
}
function writeParamsToURL() {
  const sp = new URLSearchParams();
  for (const k of URL_KEYS) sp.set(k, String(params[k]));
  history.replaceState(null, '', '?' + sp.toString());
}

function bindNumber(id, key, after) {
  const el = document.getElementById(id);
  el.value = params[key];
  // input fires on every keystroke / spinner click — keep params + URL in
  // sync immediately so the URL is always copy-pasteable.
  el.addEventListener('input', () => {
    const v = parseFloat(el.value);
    if (Number.isFinite(v)) params[key] = v;
    writeParamsToURL();
  });
  // change fires on blur / Enter — run heavy after-callbacks (rebuilds) here
  // so they don't fire on every digit typed.
  if (after) el.addEventListener('change', after);
}
function bindRange(id, key) {
  const el = document.getElementById(id);
  el.value = params[key];
  el.addEventListener('input', () => {
    params[key] = parseFloat(el.value);
    writeParamsToURL();   // history.replaceState is cheap; safe to call per drag tick
  });
}

  paused = !paused;
  e.target.textContent = paused ? 'play' : 'pause';
};
document.getElementById('kickBtn').onclick = () => {
  for (const b of blocks) {
    b.vel[0] += (Math.random()-0.5)*4;
    b.vel[1] += (Math.random()-0.5)*4;
    b.vel[2] += (Math.random()-0.5)*4;
    b.ang[0] += (Math.random()-0.5)*2;
    b.ang[1] += (Math.random()-0.5)*2;
    b.ang[2] += (Math.random()-0.5)*2;
  }
};

animate();
</script>
</body>
