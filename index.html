<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>sim3d — block affinity playground</title>
<style>
  html, body { margin: 0; height: 100%; background: #0a0d12; color: #cfd6e0;
    font: 13px/1.4 ui-sans-serif, system-ui, sans-serif; overflow: hidden; }
  #ui { position: fixed; top: 10px; left: 10px; padding: 10px 12px;
    background: rgba(15,20,28,0.78); border: 1px solid #25303d; border-radius: 6px;
    backdrop-filter: blur(6px); min-width: 240px; }
  #ui h1 { font-size: 13px; margin: 0 0 6px; letter-spacing: .04em; color: #9ad8ff; }
  #ui label { display: flex; justify-content: space-between; gap: 8px;
    align-items: center; margin: 4px 0; }
  #ui input[type=range] { width: 110px; }
  #ui input[type=number] { width: 70px; background: #1a222d; color: #cfd6e0;
    border: 1px solid #2a3543; border-radius: 3px; padding: 1px 4px; }
  #ui button { background: #1f2a36; color: #cfd6e0; border: 1px solid #2a3543;
    padding: 4px 9px; border-radius: 4px; cursor: pointer; margin-right: 4px; }
  #ui button:hover { background: #283544; }
  #ui .row { margin-top: 6px; }
  #ui hr { border: none; border-top: 1px solid #25303d; margin: 7px 0; }
  #stats { position: fixed; bottom: 10px; left: 10px; padding: 6px 9px;
    background: rgba(15,20,28,0.78); border: 1px solid #25303d; border-radius: 4px;
    font-variant-numeric: tabular-nums; }
  #help { position: fixed; bottom: 10px; right: 10px; padding: 6px 9px;
    background: rgba(15,20,28,0.78); border: 1px solid #25303d; border-radius: 4px;
    color: #7a8696; }
</style>
</head>
<body>

<div id="ui">
  <h1>SIM3D — block affinity</h1>
  <label>config <select id="config">
    <option value="head_tail">head_tail</option>
    <option value="sheet">sheet</option>
  </select></label>
  <hr>
  <label>blocks <input id="nBlocks" type="number" min="1" max="10000" step="1" value="5000"></label>
  <label>sphere R <input id="sphereR" type="number" min="2" max="40" step="0.5" value="9"></label>
  <label>cutoff <input id="cutoff" type="number" min="0.1" step="0.1" value="2.0"></label>
  <hr>
  <div class="cfg-sheet">
    <label>d_peak <input id="d_peak" type="number" step="0.05" value="0.4"></label>
    <label>in-plane rep <input id="in_plane_repulsion" type="number" step="0.1" value="-0.6"></label>
    <label>ortho rep <input id="orthogonal_repulsion" type="number" step="0.1" value="-1.2"></label>
    <label>attraction <input id="attraction" type="number" step="0.1" value="-1.2"></label>
    <label>bend (rad) <input id="bend" type="number" step="0.01" value="0.7"></label>
    <hr>
  </div>
  <div class="cfg-head_tail">
    <label>bond d <input id="bond_d" type="number" step="0.05" value="0.6"></label>
    <label>bond rep <input id="bond_rep" type="number" step="0.1" value="-0.5"></label>
    <label>bond att <input id="bond_att" type="number" step="0.1" value="-2.0"></label>
    <label>hh d <input id="hh_d" type="number" step="0.05" value="1.0"></label>
    <label>hh rep <input id="hh_rep" type="number" step="0.1" value="-0.5"></label>
    <label>hh att <input id="hh_att" type="number" step="0.1" value="-1.0"></label>
    <label>tt d <input id="tt_d" type="number" step="0.05" value="1.0"></label>
    <label>tt rep <input id="tt_rep" type="number" step="0.1" value="-0.5"></label>
    <label>tt att <input id="tt_att" type="number" step="0.1" value="-1.0"></label>
    <label>unbond k <input id="unbond_k" type="number" step="0.1" value="0.5"></label>
    <label>align k (bond) <input id="align_k" type="number" step="0.1" value="1.0"></label>
    <label>align k (HH/TT) <input id="align_unconn_k" type="number" step="0.05" value="0.3"></label>
    <hr>
  </div>
  <label>dt × <input id="dtMul" type="range" min="0.05" max="3" step="0.05" value="1"></label>
  <label>damping <input id="damping" type="range" min="0.5" max="0.999" step="0.001" value="0.994"></label>
  <label>wall k <input id="wallK" type="number" step="0.1" value="1.0"></label>
  <label>force cap <input id="fCap" type="number" step="1" value="50"></label>
  <div class="row">
    <button id="resetBtn">reset</button>
    <button id="pauseBtn">pause</button>
    <button id="kickBtn">jiggle</button>
  </div>
</div>

<div id="stats"></div>
<div id="help">drag = orbit · scroll = zoom · right-drag = pan</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import {
  DEFAULTS, makeBlock, stepBlocks, refreshNormal, setupHeadTail,
  randomQuat, randomPointInBall,
} from './physics.mjs';

// ---------------------------------------------------------------------------
// Parameters: live state, mirrors the controls in #ui. Physics module reads
// straight off this object every step, so editing a control updates behavior
// instantly.
// ---------------------------------------------------------------------------
const params = {
  ...DEFAULTS,
  nBlocks: 5000,
  dtMul: 1,
};

let blocks = [];
let scene, camera, renderer, controls, sphereMesh;
let hexGeo, hexMat, headGeo, tailGeo, headMatProto, tailMatProto;
let paused = false;

// Map a block's normal vector to RGB using |n| = (|x|, |y|, |z|). The hex
// sheet is front/back symmetric (n and -n are the same pose), so taking the
// absolute value is the right choice: a closed shell gets one continuous
// color gradient across its surface instead of two opposite-color halves.
// Equivalence class of opposite normals → same color, otherwise smooth.
function applyColorFromNormal(mat, n) {
  mat.color.setRGB(Math.abs(n[0]), Math.abs(n[1]), Math.abs(n[2]));
}

function buildScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0d12);
  scene.fog = new THREE.Fog(0x0a0d12, 25, 80);

  camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 500);
  camera.position.set(0, 6, 22);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  scene.add(new THREE.AmbientLight(0xffffff, 0.35));
  const key = new THREE.DirectionalLight(0xffffff, 0.9);
  key.position.set(5, 10, 7); scene.add(key);
  const rim = new THREE.DirectionalLight(0x88aaff, 0.4);
  rim.position.set(-6, -3, -8); scene.add(rim);

  // ── 'sheet' geometry: thin hex prism, axis = local Z (rotated from default Y).
  hexGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.08, 6);
  hexGeo.rotateX(Math.PI / 2);
  hexMat = new THREE.MeshStandardMaterial({
    color: 0x7fbcff, metalness: 0.1, roughness: 0.55,
    side: THREE.DoubleSide,
  });
  // ── 'head_tail' geometry: head = flat cuboid (face ⊥ direction); tail =
  // long cuboid (length ‖ direction). BoxGeometry's third axis is depth = Z,
  // which equals each block's local "direction" axis after quaternion rotate.
  headGeo = new THREE.BoxGeometry(1.0, 1.0, 0.15);     // wide × wide × thin
  tailGeo = new THREE.BoxGeometry(0.18, 0.18, 1.6);    // thin × thin × long
  headMatProto = new THREE.MeshStandardMaterial({ color: 0xff5544, metalness: 0.05, roughness: 0.55 });
  tailMatProto = new THREE.MeshStandardMaterial({ color: 0x5588ff, metalness: 0.05, roughness: 0.55 });

  rebuildContainer();
  rebuildBlocks();
}

function rebuildContainer() {
  if (sphereMesh) scene.remove(sphereMesh);
  const g = new THREE.SphereGeometry(params.sphereR, 32, 16);
  const m = new THREE.MeshBasicMaterial({ color: 0x2a3a4f, wireframe: true,
    transparent: true, opacity: 0.4 });
  sphereMesh = new THREE.Mesh(g, m);
  scene.add(sphereMesh);
}

function rebuildBlocks() {
  for (const b of blocks) scene.remove(b.mesh);
  blocks = [];
  const R = params.sphereR * 0.9;
  for (let i = 0; i < params.nBlocks; i++) {
    blocks.push(makeBlock(randomPointInBall(R), randomQuat()));
  }
  if (params.config === 'head_tail') setupHeadTail(blocks, params);
  for (const b of blocks) {
    refreshNormal(b);
    let mesh;
    if (params.config === 'head_tail') {
      // head = flat cuboid, tail = long cuboid; both scaled by bond_d.
      const isHead = b.type === 0;
      const mat = (isHead ? headMatProto : tailMatProto).clone();
      mesh = new THREE.Mesh(isHead ? headGeo : tailGeo, mat);
      mesh.scale.setScalar(params.bond_d);
    } else {
      // sheet hex prism, color by normal.
      const mat = hexMat.clone();
      applyColorFromNormal(mat, b.normal);
      mesh = new THREE.Mesh(hexGeo, mat);
      mesh.scale.setScalar(params.d_peak);
    }
    mesh.position.set(b.pos[0], b.pos[1], b.pos[2]);
    mesh.quaternion.set(b.quat[0], b.quat[1], b.quat[2], b.quat[3]);
    b.mesh = mesh;
    scene.add(mesh);
  }
  applyConfigVisibility();
}

// Toggle the per-config UI sections so only the active one is visible.
function applyConfigVisibility() {
  for (const el of document.querySelectorAll('.cfg-sheet'))
    el.style.display = params.config === 'sheet' ? '' : 'none';
  for (const el of document.querySelectorAll('.cfg-head_tail'))
    el.style.display = params.config === 'head_tail' ? '' : 'none';
}

// ---------------------------------------------------------------------------
// Main loop & UI wiring.
// ---------------------------------------------------------------------------
const statsEl = document.getElementById('stats');
let frame = 0, fpsTick = performance.now(), fps = 0;
let lastStepStats = { pairsChecked: 0, pairsComputed: 0 };

function syncMeshes() {
  const isSheet = params.config === 'sheet';
  for (const b of blocks) {
    b.mesh.position.set(b.pos[0], b.pos[1], b.pos[2]);
    b.mesh.quaternion.set(b.quat[0], b.quat[1], b.quat[2], b.quat[3]);
    // Color is fixed per-block in head_tail mode (set at creation by type),
    // so only re-paint sheet blocks each frame from their current normal.
    if (isSheet) applyColorFromNormal(b.mesh.material, b.normal);
  }
}

function animate() {
  requestAnimationFrame(animate);
  if (!paused) lastStepStats = stepBlocks(blocks, 0.04 * params.dtMul, params);
  syncMeshes();
  controls.update();
  renderer.render(scene, camera);

  frame++;
  const now = performance.now();
  if (now - fpsTick > 500) {
    fps = (frame * 1000 / (now - fpsTick)) | 0;
    frame = 0; fpsTick = now;
    const N = blocks.length;
    const totalPairs = (N * (N - 1) / 2) | 0;
    const fmt = (n) => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'k' : String(n);
    // total pairs · pairs the spatial hash visited · pairs within cutoff (force computed)
    statsEl.textContent =
      `${N} blocks · ${fps} fps · pairs/step  total ${fmt(totalPairs)} · `
      + `checked ${fmt(lastStepStats.pairsChecked)} · `
      + `computed ${fmt(lastStepStats.pairsComputed)}`;
  }
}

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---------------------------------------------------------------------------
// URL persistence: every tunable parameter is mirrored into the query string
// (history.replaceState — no entries piling up in back-stack), and parsed back
// on load. This makes the page state shareable as a URL.
// ---------------------------------------------------------------------------
const URL_KEYS = [
  'config',
  'nBlocks', 'sphereR', 'cutoff',
  // sheet
  'd_peak', 'in_plane_repulsion', 'orthogonal_repulsion', 'attraction', 'bend',
  // head_tail
  'bond_d', 'bond_rep', 'bond_att',
  'hh_d', 'hh_rep', 'hh_att',
  'tt_d', 'tt_rep', 'tt_att',
  'unbond_k', 'align_k', 'align_unconn_k',
  // shared
  'dtMul', 'damping', 'wallK', 'forceCap',
];

function applyURLToParams() {
  const sp = new URLSearchParams(location.search);
  for (const k of URL_KEYS) {
    if (!sp.has(k)) continue;
    const raw = sp.get(k);
    if (k === 'config') { params[k] = raw; continue; }
    const v = parseFloat(raw);
    if (Number.isFinite(v)) params[k] = v;
  }
}
function writeParamsToURL() {
  const sp = new URLSearchParams();
  for (const k of URL_KEYS) sp.set(k, String(params[k]));
  history.replaceState(null, '', '?' + sp.toString());
}

function bindNumber(id, key, after) {
  const el = document.getElementById(id);
  el.value = params[key];
  // input fires on every keystroke / spinner click — keep params + URL in
  // sync immediately so the URL is always copy-pasteable.
  el.addEventListener('input', () => {
    const v = parseFloat(el.value);
    if (Number.isFinite(v)) params[key] = v;
    writeParamsToURL();
  });
  // change fires on blur / Enter — run heavy after-callbacks (rebuilds) here
  // so they don't fire on every digit typed.
  if (after) el.addEventListener('change', after);
}
function bindRange(id, key) {
  const el = document.getElementById(id);
  el.value = params[key];
  el.addEventListener('input', () => {
    params[key] = parseFloat(el.value);
    writeParamsToURL();   // history.replaceState is cheap; safe to call per drag tick
  });
}

applyURLToParams();
buildScene();

// ── config dropdown ─────────────────────────────────────────────────────────
const configEl = document.getElementById('config');
configEl.value = params.config;
configEl.addEventListener('change', () => {
  params.config = configEl.value;
  rebuildBlocks();          // type/partner setup, geometry, color all change
  writeParamsToURL();
});

bindNumber('nBlocks', 'nBlocks', rebuildBlocks);
bindNumber('sphereR', 'sphereR', () => { rebuildContainer(); rebuildBlocks(); });
bindNumber('cutoff', 'cutoff');

// sheet
bindNumber('d_peak',  'd_peak', () => {
  if (params.config === 'sheet')
    for (const b of blocks) b.mesh.scale.setScalar(params.d_peak);
});
bindNumber('in_plane_repulsion',   'in_plane_repulsion');
bindNumber('orthogonal_repulsion', 'orthogonal_repulsion');
bindNumber('attraction',           'attraction');
bindNumber('bend',                 'bend');

// head_tail
bindNumber('bond_d', 'bond_d', () => {
  if (params.config === 'head_tail')
    for (const b of blocks) b.mesh.scale.setScalar(params.bond_d);
});
bindNumber('bond_rep', 'bond_rep');
bindNumber('bond_att', 'bond_att');
bindNumber('hh_d',     'hh_d');
bindNumber('hh_rep',   'hh_rep');
bindNumber('hh_att',   'hh_att');
bindNumber('tt_d',     'tt_d');
bindNumber('tt_rep',   'tt_rep');
bindNumber('tt_att',   'tt_att');
bindNumber('unbond_k', 'unbond_k');
bindNumber('align_k',  'align_k');
bindNumber('align_unconn_k', 'align_unconn_k');

// shared
bindNumber('wallK', 'wallK');
bindNumber('fCap',  'forceCap');
bindRange('dtMul',  'dtMul');
bindRange('damping','damping');

applyConfigVisibility();    // hide the inactive config's section
writeParamsToURL();         // canonicalize the URL on first load

document.getElementById('resetBtn').onclick = rebuildBlocks;
document.getElementById('pauseBtn').onclick = (e) => {
  paused = !paused;
  e.target.textContent = paused ? 'play' : 'pause';
};
document.getElementById('kickBtn').onclick = () => {
  for (const b of blocks) {
    b.vel[0] += (Math.random()-0.5)*4;
    b.vel[1] += (Math.random()-0.5)*4;
    b.vel[2] += (Math.random()-0.5)*4;
    b.ang[0] += (Math.random()-0.5)*2;
    b.ang[1] += (Math.random()-0.5)*2;
    b.ang[2] += (Math.random()-0.5)*2;
  }
};

animate();
</script>
</body>
</html>
