<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>sim3d — orientation alignment</title>
<style>
  html, body { margin: 0; height: 100%; background: #0a0d12; color: #cfd6e0;
    font: 13px/1.4 ui-sans-serif, system-ui, sans-serif; overflow: hidden; }
  #ui { position: fixed; top: 10px; left: 10px; padding: 10px 12px;
    background: rgba(15,20,28,0.78); border: 1px solid #25303d; border-radius: 6px;
    backdrop-filter: blur(6px); min-width: 240px; max-height: calc(100vh - 310px);
    overflow-y: auto; }
  #ui h1 { font-size: 13px; margin: 0 0 6px; letter-spacing: .04em; color: #9ad8ff; }
  #ui label { display: flex; justify-content: space-between; gap: 8px;
    align-items: center; margin: 4px 0; }
  #ui input[type=range] { width: 110px; }
  #ui input[type=number] { width: 70px; background: #1a222d; color: #cfd6e0;
    border: 1px solid #2a3543; border-radius: 3px; padding: 1px 4px; }
  #ui button { background: #1f2a36; color: #cfd6e0; border: 1px solid #2a3543;
    padding: 4px 9px; border-radius: 4px; cursor: pointer; margin-right: 4px; }
  #ui button:hover { background: #283544; }
  #ui .row { margin-top: 6px; }
  #ui hr { border: none; border-top: 1px solid #25303d; margin: 7px 0; }
  #histPanel { position: fixed; left: 10px; bottom: 40px; width: 240px;
    padding: 8px 10px; background: rgba(15,20,28,0.78);
    border: 1px solid #25303d; border-radius: 6px; backdrop-filter: blur(6px);
    display: flex; flex-direction: column; }
  #histPanel h2 { font-size: 11px; margin: 0 0 6px; color: #9ad8ff;
    letter-spacing: .04em; font-weight: normal; }
  #histCanvas { display: block; width: 220px; height: 220px; background: transparent; }
  #stats { position: fixed; bottom: 10px; left: 10px; padding: 6px 9px;
    background: rgba(15,20,28,0.78); border: 1px solid #25303d; border-radius: 4px;
    font-variant-numeric: tabular-nums; }
  #help { position: fixed; bottom: 10px; right: 10px; padding: 6px 9px;
    background: rgba(15,20,28,0.78); border: 1px solid #25303d; border-radius: 4px;
    color: #7a8696; }
  #help a { color: #9ad8ff; text-decoration: none; margin-right: 10px; }
  /* Observer view: fills the right half of the screen when active. The main
     3D canvas is resized to the left half so the two views sit side-by-side. */
  #obsPanel { position: fixed; top: 0; right: 0; width: 50%; height: 100%;
    background: #0a0d12; border-left: 2px solid #25303d;
    display: none; flex-direction: column; z-index: 5; }
  #obsPanel.active { display: flex; }
  #obsPanel header { padding: 8px 12px; display: flex;
    justify-content: space-between; align-items: center;
    border-bottom: 1px solid #25303d; flex: 0 0 auto; }
  #obsPanel header h2 { font-size: 11px; margin: 0; color: #9ad8ff;
    letter-spacing: .04em; font-weight: normal; }
  #obsPanel header button { background: #1f2a36; color: #cfd6e0;
    border: 1px solid #2a3543; padding: 2px 8px; border-radius: 3px;
    cursor: pointer; font: inherit; margin-left: 4px; }
  #obsPanel header button:hover { background: #283544; }
  #obsPanel header button:disabled { opacity: 0.4; cursor: not-allowed; }
  #obsCanvas { flex: 1 1 auto; display: block; width: 100%; }
  #obsTimeRow { padding: 6px 12px; flex: 0 0 auto;
    border-top: 1px solid #25303d; }
  #obsTimeSlider { width: 100%; cursor: pointer; }
  #obsStatus { padding: 4px 12px; font-size: 11px; color: #7a8696;
    border-top: 1px solid #25303d; flex: 0 0 auto;
    font-variant-numeric: tabular-nums; }
  #ui button:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<div id="ui">
  <h1>SIM3D — alignment</h1>
  <label title="Grid resolution per axis. The lattice is N×N×N coordinate frames inside the periodic cube. Cost scales as N³ for the alignment step (massively cheaper on GPU) and as N³ for the direction histogram (constant time per cell after the LUT). Refine doubles N and copies each old cell to a 2×2×2 block of new ones, so the simulation continues from the (now-finer) field instead of restarting from random.">N <input id="N" type="number" min="2" max="128" step="1" value="16"><button id="refineBtn" style="margin-left:6px;padding:1px 6px;">refine ×2</button></label>
  <label title="Run the alignment iteration on the GPU as a ping-pong fragment-shader pass. CPU stepAlign is the bottleneck at large N (≈13 ms/step at N=40); the GPU version is typically 1–2 orders of magnitude faster, with one readPixels per frame to feed the visualization. Falls back to CPU automatically on WebGL1.">GPU compute <input type="checkbox" id="useGPU" checked></label>
  <label title="Edge length of the periodic cube. Frames are placed on a regular grid with spacing cubeSize/N; the boundary wraps so neighbors of an edge cell are on the opposite face.">cube size <input id="cubeSize" type="number" min="2" max="100" step="1" value="18"></label>
  <hr>
  <label title="Per-step alignment fraction. Each frame applies a rotation that's η·(1/6)·Σ rot_to_neighbors — i.e. rotates ~η of the way toward the average neighbor orientation. 0.05 = slow relaxation; 0.5 = aggressive snap.">step rate η <input id="eta" type="range" min="0.01" max="1.0" step="0.01" value="0.2"></label>
  <label title="Per-step random-rotation magnitude (radians). Each axis of the rotation update gets uniform noise in [-noise, noise]. Acts like temperature: noise > 0 keeps the system fluctuating instead of freezing on a metastable defect.">noise <input id="noise" type="range" min="0" max="0.5" step="0.005" value="0"></label>
  <hr>
  <label title="Render mode.&#10;&#10;heat: voxel colored AND faded by misalignment to neighbors. Aligned cells are transparent, defects show as bright opaque clusters. Highlights DEFECTS.&#10;domains: voxel colored by its frame's +Z direction (HSL hue from azimuth, lightness from elevation), and faded by 1−misalignment so aligned regions show as solid same-color blobs and domain walls / defects fade out. Highlights ALIGNED DOMAINS.&#10;axes: each grid point shows its frame as 3 line segments — red = +X, green = +Y, blue = +Z.">render <select id="renderMode">
    <option value="heat">misalignment (heat)</option>
    <option value="domains">domains (direction)</option>
    <option value="axes">axes (RGB sticks)</option>
  </select></label>
  <label class="mode-axes" title="Length of each axis stick (visual only). The frame is drawn as 3 line segments from the grid point outward — red = +X, green = +Y, blue = +Z. Set near the grid spacing to avoid overlap, smaller to declutter.">axis length <input id="axisLen" type="range" min="0.05" max="2.0" step="0.05" value="0.5"></label>
  <label class="mode-voxel" title="Voxel size as a fraction of the grid spacing. 1.0 = voxels touch their neighbors (no gaps); smaller = isolated cubes with visible spacing.">voxel size <input id="voxelScale" type="range" min="0.1" max="1.0" step="0.05" value="1.0"></label>
  <label class="mode-voxel" title="Misalignment value that maps to 'fully saturated' on the alpha curve. In heat mode this is the value that becomes fully bright red and fully opaque; in domains mode it's the value at which a cell becomes fully transparent.">color cap <input id="misalignCap" type="range" min="0.05" max="1.0" step="0.05" value="0.5"></label>
  <label class="mode-voxel" title="Transparency curve exponent.&#10;heat mode:    alpha = t^γ          (t = misalignment / cap; γ>1 = only severe defects show)&#10;domains mode: alpha = (1−t)^γ      (γ>1 = only nearly-perfect aligned regions show)">α gamma <input id="alphaGamma" type="range" min="0.2" max="5.0" step="0.1" value="1.0"></label>
  <hr>
  <label title="Trace streamlines starting from a regular grid on the cube's −Z face, stepping along each cell's local +Z direction, until they exit any cube face. Always rendered on top of the voxel mesh so they overlay any render mode (heat, domains, axes).">paths <input type="checkbox" id="showPaths"></label>
  <label class="paths-on" title="Number of streamline seeds along each axis on the seeding face. Total streamlines = seeds².">seeds/side <input id="pathSeeds" type="range" min="2" max="20" step="1" value="10"></label>
  <label class="paths-on" title="Streamline integration step as a fraction of the grid spacing. Smaller = smoother curves, more vertices, slightly more CPU; larger = chunkier but cheaper.">step size <input id="pathStepFrac" type="range" min="0.25" max="1.0" step="0.05" value="0.5"></label>
  <hr>
  <label title="Edge length, in world units, of the rectilinear grid of test particles dropped in the observer's local xy-plane when 'simulate' is pressed. Each particle sits at the geodesic distance equal to its planar distance from the observer (xy-tangent ray-march).">obs grid size <input id="obsGridSize" type="range" min="0.5" max="20" step="0.25" value="4.5"></label>
  <label title="Number of test particles along each edge of the grid. Total = N². Cost scales as N²·numSteps.">obs grid N <input id="obsGridN" type="number" min="3" max="25" step="2" value="9"></label>
  <label title="Observer proper-time step. Each tick advances the observer by dt · e_z(p_obs).">obs dt <input id="obsDt" type="range" min="0.01" max="1.0" step="0.01" value="0.1"></label>
  <label title="Total observer time to follow. numSteps = totalTime / dt, capped at 1000 to bound memory.">obs total time <input id="obsTotalTime" type="number" min="1" max="200" step="1" value="40"></label>
  <label title="How many alignment steps to run between renders. 1 = step every frame; higher values let you watch fast convergence in real time.">steps/frame <input id="stepsPerFrame" type="number" min="1" max="50" step="1" value="1"></label>
  <div class="row">
    <button id="resetBtn">reset</button>
    <button id="pauseBtn">pause</button>
    <button id="randBtn">randomize</button>
    <button id="simulateBtn" title="Place an observer at the cube center; let it follow the local +Z (time) direction. A polar grid of test particles is dropped in the observer's xy-plane, then advanced step-by-step to keep them on the observer's instantaneous xy-plane. Their projected paths are drawn on a 2D map (right) colored by local time-warp factor (red=test particle's time runs faster than observer's, blue=slower). Pause the alignment first.">simulate</button>
  </div>
</div>

<div id="histPanel">
  <h2>+Z direction histogram</h2>
  <canvas id="histCanvas"></canvas>
</div>

<div id="obsPanel">
  <header>
    <h2>OBSERVER VIEW — test-particle worldlines in the observer's local xy-plane</h2>
    <div>
      <button id="obsPlayBtn" title="Pause / resume the observer-time stepping. The map keeps showing the trails accumulated so far.">pause</button>
      <button id="obsStepBtn" title="Advance the observer one tick. Auto-jumps the time slider to the new latest step.">step</button>
      <button id="closeObsBtn">close</button>
    </div>
  </header>
  <canvas id="obsCanvas"></canvas>
  <div id="obsTimeRow">
    <input type="range" id="obsTimeSlider" min="0" max="0" value="0" step="1"
      title="Scrub through observer time. Drag back to view past states (test-particle trails are truncated, observer marker jumps back along its worldline). Drag to the latest step to re-enable auto-follow.">
  </div>
  <div id="obsStatus">step 0/0</div>
</div>

<div id="stats"></div>
<div id="help"><a href="index.html">← particle sim</a>drag = orbit · scroll = zoom · x/y/z keys (Shift = reverse) shift cube axes</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import {
  createAlignGrid, randomizeAlignGrid, stepAlign,
  fillAxesGeometry, fillZDirections, fillCellMisalignment,
  meanNeighborMisalignment,
} from './align.mjs?v=3';
import { createDirectionHistogram } from './histogram.mjs?v=2';
import { createGPUAligner } from './align_gpu.mjs?v=1';

const params = {
  N: 16,
  cubeSize: 18,
  eta: 0.2,
  noise: 0,
  renderMode: 'heat',
  axisLen: 0.5,
  voxelScale: 1.0,
  misalignCap: 0.5,
  alphaGamma: 1.0,
  stepsPerFrame: 1,
  // Render-only origin shift in grid-cell units. PBC wraps — pure visual
  // rotation of which cell sits where; the simulation state is unchanged.
  offsetCells: [0, 0, 0],
  // Run the alignment iteration on the GPU (ping-pong float texture +
  // fragment shader). Enabled by default; falls back to CPU automatically
  // if the renderer is WebGL1.
  useGPU: true,
  // Streamline overlay (independent of render mode).
  showPaths: false,
  pathSeeds: 10,
  pathStepFrac: 0.5,
  // Observer simulation parameters (read at simulate-button click time).
  obsGridSize: 4.5,            // edge length of the rectilinear test-particle grid
  obsGridN: 9,                 // particles per edge → total = N²
  obsDt: 0.10,                 // observer time step
  obsTotalTime: 40,            // total observer time → numSteps = totalTime / dt
};

let scene, camera, renderer, controls, cubeMesh;
let lines, lineGeom, linePos, lineCol;
let voxelMesh, voxelMisalignBuf, voxelAlphaBuf;
let state, axesBuf, dirsBuf, hist;
let gpuAligner = null;
// Streamline overlay: a single LineSegments mesh, allocated oversized once
// at startup (fixed-cap buffers; drawRange limits per-frame). Each segment
// is one integration step; positions and colors rewritten per frame.
let pathLines, pathGeom, pathPos, pathCol;
const _pathColor = new THREE.Color();
const PATH_MAX_SEEDS = 20;                                   // matches UI slider max
const PATH_MAX_STREAMS = PATH_MAX_SEEDS * PATH_MAX_SEEDS;    // 400
const PATH_MAX_STEPS = 1024;                                 // safe for N≤128, stepFrac≥0.25
// Reusable scratch for trilinear interpolation (8 corner directions × 3 floats),
// allocated once so updatePaths' inner loop doesn't churn the GC.
const _cornerDirs = new Float32Array(24);

// Observer simulation state (null when not running). Created by
// setupObserverSim, advanced one step per animation frame in animate(),
// torn down by closeObserverPanel.
let obsSim = null;
let obsPaused = false;            // pause/play of observer-time stepping
let obsViewStep = 0;              // which step the user is currently looking at
let obsFollowLatest = true;       // slider auto-tracks obsSim.step
let obsPosHistory = null;         // [[x,y,z], ...] one entry per state (step 0 = initial)
let obsMapDirty = false;          // 2D map needs a redraw
let obsCanvas, obsCtx, obsStatusEl, obsPanel, obsPlayBtn, obsTimeSlider;
let obsMarker, obsMarkerLine, obsMarkerLinePos;
// Test-particle 3D rendering: small spheres at each particle's current
// position, plus a LineSegments mesh showing every particle's worldline.
// Both rebuilt every frame from per-particle posHistory[] arrays.
let obsTpMesh = null, obsTpPathMesh = null;
let obsTpPathPos = null, obsTpPathCol = null;
const _obsTpMatrix = new THREE.Matrix4();
const _obsTpColor = new THREE.Color();
const _obsRgb = [0, 0, 0];
const OBS_RAY_DS_FRAC = 0.25;          // ray-march step as fraction of grid spacing
const OBS_NUM_STEPS_CAP = 1000;        // hard ceiling on numSteps to bound memory
const OBS_WORLDLINE_MAX = OBS_NUM_STEPS_CAP + 2;
// Reusable scratch quaternions / vectors so the observer step doesn't churn GC.
const _qScratch = [0, 0, 0, 0];
const _exScratch = [0, 0, 0];
const _eyScratch = [0, 0, 0];
const _ezScratch = [0, 0, 0];
const _exScratch2 = [0, 0, 0];
const _eyScratch2 = [0, 0, 0];
const _ezScratch2 = [0, 0, 0];
let paused = false;
const _voxelMatrix = new THREE.Matrix4();
const _voxelColor = new THREE.Color();

function buildScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0d12);
  scene.fog = new THREE.Fog(0x0a0d12, 35, 100);

  camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 500);
  camera.position.set(12, 14, 28);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  // The line material doesn't react to lighting; the voxel material
  // (MeshStandardMaterial) does. Ambient + one directional light gives the
  // voxels a bit of depth without overwhelming their per-instance colors.
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dl = new THREE.DirectionalLight(0xffffff, 0.5);
  dl.position.set(6, 12, 8); scene.add(dl);

  // Observer marker + worldline (visible only while the observer simulation
  // is running). The marker is a small bright sphere; the worldline is a
  // LineSegments mesh with skip-on-wrap so PBC jumps don't draw streaks.
  obsMarker = new THREE.Mesh(
    new THREE.SphereGeometry(0.35, 14, 10),
    new THREE.MeshBasicMaterial({ color: 0xffff66 })
  );
  obsMarker.visible = false;
  obsMarker.frustumCulled = false;
  obsMarker.renderOrder = 1000;
  scene.add(obsMarker);
  obsMarkerLinePos = new Float32Array(OBS_WORLDLINE_MAX * 6);
  const wlGeom = new THREE.BufferGeometry();
  wlGeom.setAttribute('position', new THREE.BufferAttribute(obsMarkerLinePos, 3));
  wlGeom.setDrawRange(0, 0);
  obsMarkerLine = new THREE.LineSegments(wlGeom, new THREE.LineBasicMaterial({
    color: 0xffff66, transparent: true, depthTest: false, depthWrite: false,
  }));
  obsMarkerLine.visible = false;
  obsMarkerLine.frustumCulled = false;
  obsMarkerLine.renderOrder = 1000;
  scene.add(obsMarkerLine);
}

// Periodic cube: the 12 edges only (not a triangulated wireframe) so the
// boundary stays visually clean. Replaces the existing mesh on cube-size
// changes.
function rebuildCube() {
  if (cubeMesh) scene.remove(cubeMesh);
  const L = params.cubeSize;
  const eg = new THREE.EdgesGeometry(new THREE.BoxGeometry(L, L, L));
  cubeMesh = new THREE.LineSegments(eg, new THREE.LineBasicMaterial({
    color: 0x2a3a4f, transparent: true, opacity: 0.6,
  }));
  scene.add(cubeMesh);
}

// Build (or rebuild after N change) the line-segment mesh that draws every
// cell's three coordinate axes. Vertex layout matches fillAxesGeometry's
// output: (origin, end) pairs for X, Y, Z back-to-back per cell. The color
// buffer is set once at build time — only positions get rewritten per frame.
function rebuildGrid() {
  // An open observer simulation references the about-to-be-replaced
  // state.quats; close it before swapping the field out from under it.
  if (obsSim) closeObserverPanel();
  if (lines) {
    scene.remove(lines);
    lineGeom.dispose();
  }
  if (voxelMesh) {
    scene.remove(voxelMesh);
    voxelMesh.geometry.dispose();
  }
  if (gpuAligner) {
    gpuAligner.dispose();
    gpuAligner = null;
  }
  state = createAlignGrid(params.N, params.cubeSize);
  const total = params.N * params.N * params.N;
  axesBuf = new Float32Array(total * 18);
  dirsBuf = new Float32Array(total * 3);
  voxelMisalignBuf = new Float32Array(total);
  linePos = axesBuf;
  lineCol = new Float32Array(total * 18);
  for (let i = 0; i < total; i++) {
    const ci = i * 18;
    // X axis: 2 verts, red.
    lineCol[ci     ] = 1; lineCol[ci +  1] = 0.15; lineCol[ci +  2] = 0.15;
    lineCol[ci +  3] = 1; lineCol[ci +  4] = 0.15; lineCol[ci +  5] = 0.15;
    // Y axis: 2 verts, green.
    lineCol[ci +  6] = 0.15; lineCol[ci +  7] = 1; lineCol[ci +  8] = 0.15;
    lineCol[ci +  9] = 0.15; lineCol[ci + 10] = 1; lineCol[ci + 11] = 0.15;
    // Z axis: 2 verts, blue.
    lineCol[ci + 12] = 0.3; lineCol[ci + 13] = 0.4; lineCol[ci + 14] = 1;
    lineCol[ci + 15] = 0.3; lineCol[ci + 16] = 0.4; lineCol[ci + 17] = 1;
  }
  lineGeom = new THREE.BufferGeometry();
  lineGeom.setAttribute('position', new THREE.BufferAttribute(linePos, 3));
  lineGeom.setAttribute('color', new THREE.BufferAttribute(lineCol, 3));
  lines = new THREE.LineSegments(lineGeom, new THREE.LineBasicMaterial({
    vertexColors: true,
  }));
  lines.frustumCulled = false;
  scene.add(lines);

  // Voxel InstancedMesh: a unit-cube geometry, one instance per grid cell,
  // scaled and translated via the per-instance matrix. Per-instance colors
  // (instanceColor attribute) carry the misalignment heat map; per-instance
  // alpha (a custom InstancedBufferAttribute, read by the shader patch
  // below) fades aligned cells out so defects show through. Unit geometry +
  // matrix-scale lets voxelScale be a slider with no geometry rebuild.
  const voxGeo = new THREE.BoxGeometry(1, 1, 1);
  // alphaToCoverage instead of conventional alpha blending. The standard
  // alpha-blend pipeline needs back-to-front draw order for correct
  // composition, and InstancedMesh has no per-instance depth sort — so when
  // the camera flips around (orbit) or instances get repositioned (xyz key
  // shift), the rendering order suddenly disagrees with depth and you get
  // washed-out / missing patches. alphaToCoverage uses the MSAA sample mask
  // to encode per-fragment alpha; depth testing then works correctly per
  // sample, so the result is order-independent at the cost of a slight
  // graininess (4-sample MSAA → ~5 alpha levels per pixel). Renderer was
  // already created with antialias: true, which is what enables this.
  const voxMat = new THREE.MeshStandardMaterial({
    roughness: 0.6, metalness: 0.0,
    alphaToCoverage: true,
    // Discard fragments below ~zero alpha entirely (avoids depth pollution
    // from invisible cells and keeps the coverage mask clean).
    alphaTest: 0.01,
  });
  // MeshStandardMaterial doesn't expose per-instance alpha out of the box,
  // so we splice a tiny attribute + varying into the standard shader and
  // multiply gl_FragColor.a after <opaque_fragment>. The attribute is fed
  // from voxelAlphaBuf, written each frame in updateVoxelColors.
  voxMat.onBeforeCompile = (shader) => {
    shader.vertexShader = shader.vertexShader
      .replace('#include <common>',
        'attribute float instanceAlpha;\nvarying float vAlpha;\n#include <common>')
      .replace('#include <begin_vertex>',
        'vAlpha = instanceAlpha;\n#include <begin_vertex>');
    shader.fragmentShader = shader.fragmentShader
      .replace('#include <common>',
        'varying float vAlpha;\n#include <common>')
      .replace('#include <opaque_fragment>',
        '#include <opaque_fragment>\n  gl_FragColor.a *= vAlpha;');
  };
  voxelMesh = new THREE.InstancedMesh(voxGeo, voxMat, total);
  voxelMesh.frustumCulled = false;
  // Initialise the instanceColor buffer (THREE allocates it on first call).
  for (let i = 0; i < total; i++) voxelMesh.setColorAt(i, _voxelColor.set(0));
  // Per-instance alpha. Zeros = invisible until the first updateVoxelColors.
  voxelAlphaBuf = new Float32Array(total);
  voxelMesh.geometry.setAttribute('instanceAlpha',
    new THREE.InstancedBufferAttribute(voxelAlphaBuf, 1));
  updateVoxelTransforms();
  scene.add(voxelMesh);

  applyRenderMode();
  if (params.useGPU) tryEnableGPU();
}

// Create the GPU aligner (if supported) and seed it from the current CPU
// state. Falls back to CPU + uncheck the toggle on WebGL1. Idempotent: if
// gpuAligner already exists, no-op.
function tryEnableGPU() {
  if (gpuAligner) return;
  gpuAligner = createGPUAligner(renderer, params.N);
  if (!gpuAligner) {
    console.warn('GPU compute unavailable (WebGL2 required). Using CPU.');
    params.useGPU = false;
    const el = document.getElementById('useGPU');
    if (el) el.checked = false;
    return;
  }
  gpuAligner.upload(state.quats);
}

// Build the streamline overlay mesh once at startup. Buffers are sized for
// the worst case (PATH_MAX_STREAMS · PATH_MAX_STEPS · 2 vertices) so we
// don't reallocate when seed-count or N changes; setDrawRange caps the
// active vertex count each frame. depthTest off so streamlines stay
// visible through opaque voxels — they're an overlay, not in-scene.
function buildPaths() {
  const maxVerts = PATH_MAX_STREAMS * PATH_MAX_STEPS * 2;
  pathPos = new Float32Array(maxVerts * 3);
  pathCol = new Float32Array(maxVerts * 3);
  pathGeom = new THREE.BufferGeometry();
  pathGeom.setAttribute('position', new THREE.BufferAttribute(pathPos, 3));
  pathGeom.setAttribute('color',    new THREE.BufferAttribute(pathCol, 3));
  pathGeom.setDrawRange(0, 0);
  pathLines = new THREE.LineSegments(pathGeom, new THREE.LineBasicMaterial({
    vertexColors: true,
    depthTest: false,
    depthWrite: false,
    transparent: true,
  }));
  pathLines.frustumCulled = false;
  pathLines.renderOrder = 999;       // drawn after voxels
  pathLines.visible = params.showPaths;
  scene.add(pathLines);
}

// Re-trace every streamline. Each one starts on the LOGICAL −Z face (iz=0
// layer in unshifted grid coords) on a regular grid, then takes Euler
// steps along the local +Z axis. The integration runs in unshifted
// coordinates and terminates when it leaves the cube on any face. For
// RENDERING, each vertex gets the same offset+wrap as the cells
// (params.offsetCells), so when you shift the cube with x/y/z the
// streamlines shift with it. A segment whose two endpoints land on
// opposite sides of the cube after wrap is dropped — the streamline
// visibly breaks at the wrap boundary rather than stretching across the
// box.
//
// The local direction is TRILINEARLY INTERPOLATED from the 8 cell-centered
// surrounding samples (clamped to the cube; no PBC for interpolation, so
// near-face streamlines aren't contaminated by cells from the opposite
// side). Each cell's frame is treated as an unsigned axis — each corner's
// +Z is sign-fixed to dz≥0 before blending so the 8 samples form a
// coherent line-field rather than cancelling each other in the average.
// The blended direction is renormalized and re-sign-fixed so streamlines
// from −Z always march toward +Z.
//
// Without interpolation the path would jump abruptly every time it crossed
// a cell boundary; with it the path is C0-continuous across cell faces.
//
// Color per segment uses the same HSL-from-direction mapping as the
// domains voxel mode, so streamlines passing through an aligned domain
// take that domain's color.
function updatePaths() {
  if (!pathLines) return;
  if (!params.showPaths) { pathLines.visible = false; return; }
  pathLines.visible = true;

  const N = params.N;
  const L = params.cubeSize;
  const half = 0.5 * L;
  const s = L / N;
  const inv_s = 1 / s;
  const stepSize = s * params.pathStepFrac;
  const seeds = Math.min(PATH_MAX_SEEDS, params.pathSeeds | 0);
  const cap = pathPos.length;
  const TWO_PI_INV = 1 / (2 * Math.PI);
  // Per-axis render offset in world units, matching fillAxesGeometry and
  // updateVoxelTransforms.
  const offX = params.offsetCells[0] * s;
  const offY = params.offsetCells[1] * s;
  const offZ = params.offsetCells[2] * s;
  // Threshold for "this segment crossed a wrap boundary": with stepSize ≪
  // half, any post-wrap step bigger than half a cube must come from a wrap.
  const wrapJump = half;

  let outIdx = 0;
  for (let a = 0; a < seeds && outIdx < cap; a++) {
    for (let b = 0; b < seeds && outIdx < cap; b++) {
      // Seed a half-step inside the LOGICAL −Z face on a regular grid.
      let px = -half + (a + 0.5) * (L / seeds);
      let py = -half + (b + 0.5) * (L / seeds);
      let pz = -half + 1e-4;
      // Initial render position = (logical + offset) wrapped to [-L/2, L/2).
      let rxPrev = (px + offX) - L * Math.floor((px + offX + half) / L);
      let ryPrev = (py + offY) - L * Math.floor((py + offY + half) / L);
      let rzPrev = (pz + offZ) - L * Math.floor((pz + offZ + half) / L);
      for (let step = 0; step < PATH_MAX_STEPS; step++) {
        // Position-based exit: streamline terminates as soon as it leaves
        // the cube along any axis.
        if (px < -half || px >= half ||
            py < -half || py >= half ||
            pz < -half || pz >= half) break;

        // Cell-centered float coords. Cells centered at integer fx/fy/fz;
        // boundaries at half-integers. fx/fy/fz ∈ [-0.5, N-0.5).
        const fx = (px + half) * inv_s - 0.5;
        const fy = (py + half) * inv_s - 0.5;
        const fz = (pz + half) * inv_s - 0.5;
        const ix0 = Math.floor(fx);
        const iy0 = Math.floor(fy);
        const iz0 = Math.floor(fz);
        const tx = fx - ix0;
        const ty = fy - iy0;
        const tz = fz - iz0;

        // Sample the 8 surrounding cells. Clamp to grid range (no PBC for
        // interpolation): a streamline near the −Z face uses only −Z-side
        // cells, instead of being half-pulled toward the +Z face's wrap.
        // Each corner direction is sign-fixed to dz≥0 so the line-field
        // averages coherently in the trilinear blend.
        for (let kz = 0; kz <= 1; kz++) {
          let ciz = iz0 + kz;
          if (ciz < 0) ciz = 0; else if (ciz >= N) ciz = N - 1;
          for (let ky = 0; ky <= 1; ky++) {
            let ciy = iy0 + ky;
            if (ciy < 0) ciy = 0; else if (ciy >= N) ciy = N - 1;
            for (let kx = 0; kx <= 1; kx++) {
              let cix = ix0 + kx;
              if (cix < 0) cix = 0; else if (cix >= N) cix = N - 1;
              const cci = (ciz * N + ciy) * N + cix;
              const qx = state.quats[4*cci    ];
              const qy = state.quats[4*cci + 1];
              const qz = state.quats[4*cci + 2];
              const qw = state.quats[4*cci + 3];
              let cdx = 2*(qx*qz + qy*qw);
              let cdy = 2*(qy*qz - qx*qw);
              let cdz = 1 - 2*(qx*qx + qy*qy);
              if (cdz < 0) { cdx = -cdx; cdy = -cdy; cdz = -cdz; }
              const ci2 = (kz*4 + ky*2 + kx) * 3;
              _cornerDirs[ci2    ] = cdx;
              _cornerDirs[ci2 + 1] = cdy;
              _cornerDirs[ci2 + 2] = cdz;
            }
          }
        }

        // Trilinear weights.
        const w000 = (1-tx)*(1-ty)*(1-tz);
        const w100 = tx    *(1-ty)*(1-tz);
        const w010 = (1-tx)*ty    *(1-tz);
        const w110 = tx    *ty    *(1-tz);
        const w001 = (1-tx)*(1-ty)*tz;
        const w101 = tx    *(1-ty)*tz;
        const w011 = (1-tx)*ty    *tz;
        const w111 = tx    *ty    *tz;

        // Blend.
        let dx = w000*_cornerDirs[ 0] + w100*_cornerDirs[ 3]
               + w010*_cornerDirs[ 6] + w110*_cornerDirs[ 9]
               + w001*_cornerDirs[12] + w101*_cornerDirs[15]
               + w011*_cornerDirs[18] + w111*_cornerDirs[21];
        let dy = w000*_cornerDirs[ 1] + w100*_cornerDirs[ 4]
               + w010*_cornerDirs[ 7] + w110*_cornerDirs[10]
               + w001*_cornerDirs[13] + w101*_cornerDirs[16]
               + w011*_cornerDirs[19] + w111*_cornerDirs[22];
        let dz = w000*_cornerDirs[ 2] + w100*_cornerDirs[ 5]
               + w010*_cornerDirs[ 8] + w110*_cornerDirs[11]
               + w001*_cornerDirs[14] + w101*_cornerDirs[17]
               + w011*_cornerDirs[20] + w111*_cornerDirs[23];

        // Normalize. Fall back to +Z if the 8 corners cancel — happens only
        // if the local field is genuinely undefined (rare, e.g. at a defect).
        const len = Math.hypot(dx, dy, dz);
        if (len > 1e-8) { dx /= len; dy /= len; dz /= len; }
        else { dx = 0; dy = 0; dz = 1; }
        // Final sign-fix: the per-corner sign-fix doesn't guarantee dz≥0 of
        // the blend (a corner with dz≈0 can swing the result negative).
        if (dz < 0) { dx = -dx; dy = -dy; dz = -dz; }

        const nx = px + dx * stepSize;
        const ny = py + dy * stepSize;
        const nz = pz + dz * stepSize;
        // Render position of the new endpoint, with offset+wrap.
        const rxNext = (nx + offX) - L * Math.floor((nx + offX + half) / L);
        const ryNext = (ny + offY) - L * Math.floor((ny + offY + half) / L);
        const rzNext = (nz + offZ) - L * Math.floor((nz + offZ + half) / L);
        // Drop the segment if it crossed a wrap boundary (its two endpoints
        // landed on opposite sides). Otherwise emit it.
        const wrapped =
          Math.abs(rxNext - rxPrev) > wrapJump ||
          Math.abs(ryNext - ryPrev) > wrapJump ||
          Math.abs(rzNext - rzPrev) > wrapJump;
        if (!wrapped && outIdx + 6 <= cap) {
          pathPos[outIdx    ] = rxPrev; pathPos[outIdx + 1] = ryPrev; pathPos[outIdx + 2] = rzPrev;
          pathPos[outIdx + 3] = rxNext; pathPos[outIdx + 4] = ryNext; pathPos[outIdx + 5] = rzNext;
          let hue = Math.atan2(dy, dx) * TWO_PI_INV;
          if (hue < 0) hue += 1;
          const sat = Math.sqrt(dx*dx + dy*dy);
          const lum = 0.55 + 0.20 * dz;
          _pathColor.setHSL(hue, sat, lum);
          const r = _pathColor.r, gn = _pathColor.g, bl = _pathColor.b;
          pathCol[outIdx    ] = r; pathCol[outIdx + 1] = gn; pathCol[outIdx + 2] = bl;
          pathCol[outIdx + 3] = r; pathCol[outIdx + 4] = gn; pathCol[outIdx + 5] = bl;
          outIdx += 6;
        }
        px = nx; py = ny; pz = nz;
        rxPrev = rxNext; ryPrev = ryNext; rzPrev = rzNext;
      }
    }
  }
  pathGeom.setDrawRange(0, outIdx / 3);
  pathGeom.attributes.position.needsUpdate = true;
  pathGeom.attributes.color.needsUpdate = true;
}

// UI visibility for the "paths-on" labels (seeds slider, step-size slider).
function applyPathsUI() {
  for (const el of document.querySelectorAll('.paths-on'))
    el.style.display = params.showPaths ? '' : 'none';
}

// ===========================================================================
// Observer simulation: a single particle whose worldline follows the local
// +Z axis everywhere ("time" = local +Z). Around the observer we drop a
// polar grid of test particles in the observer's instantaneous xy-plane,
// then advance each one along ITS local +Z by an amount dτ chosen so it
// lands on the observer's NEW xy-plane (a linearized synchronization). The
// ratio dτ/dt is the local time-warp factor — we color the test particle's
// trail by it.
// ---------------------------------------------------------------------------

// Sample local quaternion at world position (PBC wrap, nearest cell). Writes
// into the provided 4-array.
function localQuatAt(pos, out) {
  const N = params.N, L = params.cubeSize;
  const half = 0.5 * L, inv_s = N / L;
  let ix = Math.floor((pos[0] + half) * inv_s);
  let iy = Math.floor((pos[1] + half) * inv_s);
  let iz = Math.floor((pos[2] + half) * inv_s);
  ix = ((ix % N) + N) % N;
  iy = ((iy % N) + N) % N;
  iz = ((iz % N) + N) % N;
  const ci = (iz * N + iy) * N + ix;
  out[0] = state.quats[4*ci    ];
  out[1] = state.quats[4*ci + 1];
  out[2] = state.quats[4*ci + 2];
  out[3] = state.quats[4*ci + 3];
}

// Compute ROW-of-rotation-matrix style frame axes from a quaternion. Each
// of ex/ey/ez ends up as the world-frame image of the local +X/+Y/+Z axes.
function frameFromQuat(q, ex, ey, ez) {
  const qx = q[0], qy = q[1], qz = q[2], qw = q[3];
  ex[0] = 1 - 2*(qy*qy + qz*qz);
  ex[1] = 2*(qx*qy + qz*qw);
  ex[2] = 2*(qx*qz - qy*qw);
  ey[0] = 2*(qx*qy - qz*qw);
  ey[1] = 1 - 2*(qx*qx + qz*qz);
  ey[2] = 2*(qy*qz + qx*qw);
  ez[0] = 2*(qx*qz + qy*qw);
  ez[1] = 2*(qy*qz - qx*qw);
  ez[2] = 1 - 2*(qx*qx + qy*qy);
}

function _wrapPosCube(pos, L, half) {
  pos[0] -= L * Math.floor((pos[0] + half) / L);
  pos[1] -= L * Math.floor((pos[1] + half) / L);
  pos[2] -= L * Math.floor((pos[2] + half) / L);
}

// Initialize obsSim: place observer at the LOGICAL position whose displayed
// location is the cube center, ray-march to find polar-grid of test particles
// in observer's xy-plane. Re-clicking simulate after an x/y/z shift therefore
// drops the observer in a different part of the world (the cell that's now
// being shown at the displayed center).
function setupObserverSim() {
  const N = params.N, L = params.cubeSize;
  const half = 0.5 * L;
  const cellS = L / N;

  // displayed = wrap(logical + offsetCells·s); displayed = (0,0,0) ⇒
  // logical = wrap(-offsetCells·s).
  const offX = params.offsetCells[0] * cellS;
  const offY = params.offsetCells[1] * cellS;
  const offZ = params.offsetCells[2] * cellS;
  const obsPos = [
    -offX - L * Math.floor((-offX + half) / L),
    -offY - L * Math.floor((-offY + half) / L),
    -offZ - L * Math.floor((-offZ + half) / L),
  ];
  localQuatAt(obsPos, _qScratch);
  frameFromQuat(_qScratch, _exScratch, _eyScratch, _ezScratch);

  const gridSize = Math.max(0.001, +params.obsGridSize);
  const gridN = Math.max(2, params.obsGridN | 0);
  const halfGrid = 0.5 * gridSize;
  const cellSpacing = gridSize / (gridN - 1);
  const ds = cellS * OBS_RAY_DS_FRAC;
  const dt = Math.max(0.001, +params.obsDt);
  const numSteps = Math.min(OBS_NUM_STEPS_CAP, Math.max(1, Math.ceil(params.obsTotalTime / dt)));

  // Rectilinear grid in the observer's local xy-plane: each test point sits
  // at planar coords (xLocal, yLocal). Its 3D position is obtained by ray-
  // marching from the observer along (xLocal·ex + yLocal·ey)/r in the local
  // xy-plane (projecting out the local +Z at each step), for an arc length
  // equal to r = √(xLocal² + yLocal²).
  const testPoints = [];
  for (let iy = 0; iy < gridN; iy++) {
    const yLocal = -halfGrid + iy * cellSpacing;
    for (let ix = 0; ix < gridN; ix++) {
      const xLocal = -halfGrid + ix * cellSpacing;
      const r = Math.hypot(xLocal, yLocal);
      let tpx, tpy, tpz;
      if (r < 1e-8) {
        // Center cell of the grid — just use observer position.
        tpx = obsPos[0]; tpy = obsPos[1]; tpz = obsPos[2];
      } else {
        const cosT = xLocal / r, sinT = yLocal / r;
        let dx = cosT * _exScratch[0] + sinT * _eyScratch[0];
        let dy = cosT * _exScratch[1] + sinT * _eyScratch[1];
        let dz = cosT * _exScratch[2] + sinT * _eyScratch[2];
        let px = obsPos[0], py = obsPos[1], pz = obsPos[2];
        let arc = 0;
        while (arc < r) {
          const stepLen = Math.min(ds, r - arc);
          px += dx * stepLen; py += dy * stepLen; pz += dz * stepLen;
          arc += stepLen;
          // Wrap PBC.
          px -= L * Math.floor((px + half) / L);
          py -= L * Math.floor((py + half) / L);
          pz -= L * Math.floor((pz + half) / L);
          // Re-orient direction: project out local +Z at new pos.
          localQuatAt([px, py, pz], _qScratch);
          frameFromQuat(_qScratch, _exScratch2, _eyScratch2, _ezScratch2);
          const ddot = dx*_ezScratch2[0] + dy*_ezScratch2[1] + dz*_ezScratch2[2];
          dx -= ddot*_ezScratch2[0];
          dy -= ddot*_ezScratch2[1];
          dz -= ddot*_ezScratch2[2];
          const dlen = Math.hypot(dx, dy, dz);
          if (dlen > 1e-8) { dx /= dlen; dy /= dlen; dz /= dlen; }
          else break;
        }
        tpx = px; tpy = py; tpz = pz;
      }
      testPoints.push({
        pos: [tpx, tpy, tpz],
        warp: 1.0,
        // 2D trail in the observer's xy-frame, indexed by step. Entry 0 is
        // the initial planar grid coord (xLocal, yLocal).
        trail: [{ x: xLocal, y: yLocal, w: 1.0 }],
        // 3D position history (logical/unshifted), indexed by step. Used
        // by the in-cube dot + worldline rendering. setObsTpTransforms reads
        // posHistory[obsViewStep] each frame, applies offset+wrap.
        posHistory: [[tpx, tpy, tpz]],
        alive: true,
      });
    }
  }

  obsSim = {
    p_obs: obsPos,
    e_x: [_exScratch[0], _exScratch[1], _exScratch[2]],
    e_y: [_eyScratch[0], _eyScratch[1], _eyScratch[2]],
    e_z: [_ezScratch[0], _ezScratch[1], _ezScratch[2]],
    t_obs: 0,
    step: 0,
    numSteps,
    dt,
    testPoints,
    gridSize,
    gridN,
    rMax: gridSize * 0.5 * Math.SQRT2,   // diagonal half-length, for map scale
  };
  setupObsTpMeshes();
  // Per-state observer position log — drives both the worldline mesh
  // (rebuilt every frame from this with current offset+wrap applied) and
  // the 3D marker placement when scrubbing the time slider.
  obsPosHistory = [[obsPos[0], obsPos[1], obsPos[2]]];
  obsViewStep = 0;
  obsFollowLatest = true;
  obsMapDirty = true;
}

// Advance the observer (and all test particles) one step.
function stepObserverSim() {
  if (!obsSim || obsSim.step >= obsSim.numSteps) return;
  const N = params.N, L = params.cubeSize;
  const half = 0.5 * L;
  const dt = obsSim.dt;

  // Local frame at current observer position (sign-fix to match stored e_z
  // for line-field continuity).
  localQuatAt(obsSim.p_obs, _qScratch);
  frameFromQuat(_qScratch, _exScratch, _eyScratch, _ezScratch);
  const ezOld = obsSim.e_z;
  let dot = _ezScratch[0]*ezOld[0] + _ezScratch[1]*ezOld[1] + _ezScratch[2]*ezOld[2];
  if (dot < 0) {
    _ezScratch[0] = -_ezScratch[0];
    _ezScratch[1] = -_ezScratch[1];
    _ezScratch[2] = -_ezScratch[2];
  }

  // Step observer along the (sign-fixed) local +Z.
  const p_obs_new = [
    obsSim.p_obs[0] + dt * _ezScratch[0],
    obsSim.p_obs[1] + dt * _ezScratch[1],
    obsSim.p_obs[2] + dt * _ezScratch[2],
  ];
  // Cache the unwrapped step for the worldline-segment skip-on-wrap test.
  const obsStepDx = p_obs_new[0] - obsSim.p_obs[0];
  const obsStepDy = p_obs_new[1] - obsSim.p_obs[1];
  const obsStepDz = p_obs_new[2] - obsSim.p_obs[2];
  _wrapPosCube(p_obs_new, L, half);

  // Fresh frame at the new position; sign-fix again.
  localQuatAt(p_obs_new, _qScratch);
  frameFromQuat(_qScratch, _exScratch2, _eyScratch2, _ezScratch2);
  dot = _ezScratch2[0]*ezOld[0] + _ezScratch2[1]*ezOld[1] + _ezScratch2[2]*ezOld[2];
  if (dot < 0) {
    _ezScratch2[0] = -_ezScratch2[0];
    _ezScratch2[1] = -_ezScratch2[1];
    _ezScratch2[2] = -_ezScratch2[2];
  }

  // Parallel-transport observer's xy-frame: rotate (e_x, e_y) by the smallest
  // rotation that takes the old e_z to the new e_z. This keeps the 2D map
  // from spuriously rotating just because the cell-frame's x/y axes change
  // as the observer crosses cell boundaries — only the geometry-induced
  // rotation (Wigner-style) remains.
  const ezNew = _ezScratch2;
  let cosA = ezOld[0]*ezNew[0] + ezOld[1]*ezNew[1] + ezOld[2]*ezNew[2];
  if (cosA >  1) cosA =  1;
  if (cosA < -1) cosA = -1;
  let new_ex_x = obsSim.e_x[0], new_ex_y = obsSim.e_x[1], new_ex_z = obsSim.e_x[2];
  let new_ey_x = obsSim.e_y[0], new_ey_y = obsSim.e_y[1], new_ey_z = obsSim.e_y[2];
  if (cosA < 0.99999) {
    // axis = (old_ez × new_ez) / |...|
    let ax = ezOld[1]*ezNew[2] - ezOld[2]*ezNew[1];
    let ay = ezOld[2]*ezNew[0] - ezOld[0]*ezNew[2];
    let az = ezOld[0]*ezNew[1] - ezOld[1]*ezNew[0];
    const axisLen = Math.hypot(ax, ay, az);
    if (axisLen > 1e-8) {
      ax /= axisLen; ay /= axisLen; az /= axisLen;
      const angle = Math.acos(cosA);
      const c = Math.cos(angle), s = Math.sin(angle), oc = 1 - c;
      // Rodrigues for e_x.
      let kdv = ax*new_ex_x + ay*new_ex_y + az*new_ex_z;
      let kxvX = ay*new_ex_z - az*new_ex_y;
      let kxvY = az*new_ex_x - ax*new_ex_z;
      let kxvZ = ax*new_ex_y - ay*new_ex_x;
      const exx = new_ex_x*c + kxvX*s + ax*kdv*oc;
      const exy = new_ex_y*c + kxvY*s + ay*kdv*oc;
      const exz = new_ex_z*c + kxvZ*s + az*kdv*oc;
      // For e_y.
      kdv = ax*new_ey_x + ay*new_ey_y + az*new_ey_z;
      kxvX = ay*new_ey_z - az*new_ey_y;
      kxvY = az*new_ey_x - ax*new_ey_z;
      kxvZ = ax*new_ey_y - ay*new_ey_x;
      const eyx = new_ey_x*c + kxvX*s + ax*kdv*oc;
      const eyy = new_ey_y*c + kxvY*s + ay*kdv*oc;
      const eyz = new_ey_z*c + kxvZ*s + az*kdv*oc;
      new_ex_x = exx; new_ex_y = exy; new_ex_z = exz;
      new_ey_x = eyx; new_ey_y = eyy; new_ey_z = eyz;
    }
  }
  // Re-orthonormalize against new ez to suppress drift.
  let exDotEz = new_ex_x*ezNew[0] + new_ex_y*ezNew[1] + new_ex_z*ezNew[2];
  new_ex_x -= exDotEz*ezNew[0];
  new_ex_y -= exDotEz*ezNew[1];
  new_ex_z -= exDotEz*ezNew[2];
  let len = Math.hypot(new_ex_x, new_ex_y, new_ex_z);
  if (len > 1e-8) { new_ex_x /= len; new_ex_y /= len; new_ex_z /= len; }
  // ey = ez × ex (right-handed).
  new_ey_x = ezNew[1]*new_ex_z - ezNew[2]*new_ex_y;
  new_ey_y = ezNew[2]*new_ex_x - ezNew[0]*new_ex_z;
  new_ey_z = ezNew[0]*new_ex_y - ezNew[1]*new_ex_x;

  // Update each test particle.
  let aliveCount = 0;
  for (const tp of obsSim.testPoints) {
    if (!tp.alive) continue;

    // Local +Z at test particle (sign-fixed to match observer's new +Z so
    // both directions are coherent line-field representatives).
    localQuatAt(tp.pos, _qScratch);
    frameFromQuat(_qScratch, _exScratch, _eyScratch, _ezScratch);
    let dot_tt = _ezScratch[0]*ezNew[0] + _ezScratch[1]*ezNew[1] + _ezScratch[2]*ezNew[2];
    if (dot_tt < 0) {
      _ezScratch[0] = -_ezScratch[0];
      _ezScratch[1] = -_ezScratch[1];
      _ezScratch[2] = -_ezScratch[2];
      dot_tt = -dot_tt;
    }
    // If the test particle's time direction is nearly perpendicular to
    // observer's, synchronization diverges (1/dot_tt blows up). Drop it.
    if (dot_tt < 0.05) { tp.alive = false; continue; }

    // Linearized "synchronization": find dτ such that tp + dτ·ez_tp lies on
    // observer's new xy-plane. Use minimum-image displacement.
    let dpx = p_obs_new[0] - tp.pos[0];
    let dpy = p_obs_new[1] - tp.pos[1];
    let dpz = p_obs_new[2] - tp.pos[2];
    dpx -= L * Math.round(dpx / L);
    dpy -= L * Math.round(dpy / L);
    dpz -= L * Math.round(dpz / L);
    const numer = dpx*ezNew[0] + dpy*ezNew[1] + dpz*ezNew[2];
    const dtau = numer / dot_tt;

    // Cap the per-step proper-time motion to keep pathological cells from
    // teleporting test particles across the cube.
    const dtauStep = Math.max(-5*dt, Math.min(5*dt, dtau));
    tp.pos[0] += dtauStep * _ezScratch[0];
    tp.pos[1] += dtauStep * _ezScratch[1];
    tp.pos[2] += dtauStep * _ezScratch[2];
    _wrapPosCube(tp.pos, L, half);

    // Project the new test-particle position onto the observer's NEW
    // xy-frame (parallel-transported).
    let dpx2 = tp.pos[0] - p_obs_new[0];
    let dpy2 = tp.pos[1] - p_obs_new[1];
    let dpz2 = tp.pos[2] - p_obs_new[2];
    dpx2 -= L * Math.round(dpx2 / L);
    dpy2 -= L * Math.round(dpy2 / L);
    dpz2 -= L * Math.round(dpz2 / L);
    const x2d = dpx2*new_ex_x + dpy2*new_ex_y + dpz2*new_ex_z;
    const y2d = dpx2*new_ey_x + dpy2*new_ey_y + dpz2*new_ey_z;

    tp.warp = dtau / dt;     // unclamped warp for visualization
    tp.trail.push({ x: x2d, y: y2d, w: tp.warp });
    tp.posHistory.push([tp.pos[0], tp.pos[1], tp.pos[2]]);
    aliveCount++;
  }

  // Commit observer state.
  obsSim.p_obs = p_obs_new;
  obsSim.e_x = [new_ex_x, new_ex_y, new_ex_z];
  obsSim.e_y = [new_ey_x, new_ey_y, new_ey_z];
  obsSim.e_z = [ezNew[0], ezNew[1], ezNew[2]];
  obsSim.t_obs += dt;
  obsSim.step++;
  obsSim.aliveCount = aliveCount;
  obsPosHistory.push([p_obs_new[0], p_obs_new[1], p_obs_new[2]]);
}

// Rebuild the worldline LineSegments mesh from obsPosHistory[0..obsViewStep],
// applying the current offsetCells shift and wrapping into [-L/2, L/2). A
// segment whose endpoints land on opposite sides of the cube after wrap is
// dropped, so the worldline cleanly breaks at the wrap boundary like the
// streamlines do. Cheap to rebuild every frame (~OBS_NUM_STEPS iterations).
function rebuildObsWorldline() {
  if (!obsSim || !obsMarkerLine || !obsPosHistory) return;
  const N = params.N, L = params.cubeSize;
  const half = 0.5 * L, s = L / N;
  const offX = params.offsetCells[0] * s;
  const offY = params.offsetCells[1] * s;
  const offZ = params.offsetCells[2] * s;
  const wrapJump = half;
  const positions = obsMarkerLinePos;
  const upTo = Math.min(obsViewStep, obsPosHistory.length - 1);
  let segCount = 0;
  for (let k = 1; k <= upTo; k++) {
    const p0 = obsPosHistory[k - 1];
    const p1 = obsPosHistory[k];
    const x0 = (p0[0] + offX) - L * Math.floor((p0[0] + offX + half) / L);
    const y0 = (p0[1] + offY) - L * Math.floor((p0[1] + offY + half) / L);
    const z0 = (p0[2] + offZ) - L * Math.floor((p0[2] + offZ + half) / L);
    const x1 = (p1[0] + offX) - L * Math.floor((p1[0] + offX + half) / L);
    const y1 = (p1[1] + offY) - L * Math.floor((p1[1] + offY + half) / L);
    const z1 = (p1[2] + offZ) - L * Math.floor((p1[2] + offZ + half) / L);
    if (Math.abs(x1 - x0) > wrapJump ||
        Math.abs(y1 - y0) > wrapJump ||
        Math.abs(z1 - z0) > wrapJump) continue;
    const i = segCount * 6;
    if (i + 6 > positions.length) break;
    positions[i    ] = x0; positions[i + 1] = y0; positions[i + 2] = z0;
    positions[i + 3] = x1; positions[i + 4] = y1; positions[i + 5] = z1;
    segCount++;
  }
  obsMarkerLine.geometry.setDrawRange(0, segCount * 2);
  obsMarkerLine.geometry.attributes.position.needsUpdate = true;
}

// Place the 3D observer marker at obsPosHistory[obsViewStep] with the
// current offsetCells shift+wrap applied.
function positionObsMarker() {
  if (!obsSim || !obsMarker || !obsPosHistory) return;
  const N = params.N, L = params.cubeSize;
  const half = 0.5 * L, s = L / N;
  const k = Math.max(0, Math.min(obsViewStep, obsPosHistory.length - 1));
  const p = obsPosHistory[k];
  const offX = params.offsetCells[0] * s;
  const offY = params.offsetCells[1] * s;
  const offZ = params.offsetCells[2] * s;
  obsMarker.position.set(
    (p[0] + offX) - L * Math.floor((p[0] + offX + half) / L),
    (p[1] + offY) - L * Math.floor((p[1] + offY + half) / L),
    (p[2] + offZ) - L * Math.floor((p[2] + offZ + half) / L),
  );
}

// Map a time-warp factor (dτ/dt) to a 3-tuple of normalized RGB floats
// (writes into out). log2-scaled so w=2 / w=½ are equally far from the
// white center; clamped at w=4 / w=¼.
function _warpRgb(w, out) {
  if (w < 0) { out[0] = 0.59; out[1] = 0.20; out[2] = 0.78; return out; } // violet for retrograde time
  const t = Math.log2(Math.max(0.05, Math.abs(w))) / 2;
  const c = Math.max(-1, Math.min(1, t));
  if (c >= 0) {
    const v = 1 - c * 0.7;
    out[0] = 1; out[1] = v; out[2] = v;
  } else {
    const v = 1 + c * 0.7;
    out[0] = v; out[1] = v; out[2] = 1;
  }
  return out;
}
// Same mapping, formatted as a CSS color string for the 2D canvas.
function _warpColor(w) {
  _warpRgb(w, _obsRgb);
  return 'rgb(' + Math.round(_obsRgb[0]*255) + ',' + Math.round(_obsRgb[1]*255) + ',' + Math.round(_obsRgb[2]*255) + ')';
}

// Allocate (or recreate) the 3D test-particle dot + path meshes for the
// current obsSim. Sized to obsSim.testPoints.length × obsSim.numSteps. Both
// meshes are owned by the scene; updateObsTpMeshes rewrites their per-frame
// data, closeObserverPanel disposes them.
function setupObsTpMeshes() {
  if (!obsSim) return;
  if (obsTpMesh) {
    scene.remove(obsTpMesh);
    obsTpMesh.geometry.dispose();
    obsTpMesh = null;
  }
  if (obsTpPathMesh) {
    scene.remove(obsTpPathMesh);
    obsTpPathMesh.geometry.dispose();
    obsTpPathMesh = null;
  }
  const numTPs = obsSim.testPoints.length;
  const numSteps = obsSim.numSteps;
  const cellS = params.cubeSize / params.N;
  const dotRadius = Math.max(0.04, cellS * 0.18);

  // Dots: an InstancedMesh of small spheres, one per test particle. Per-
  // instance color is set via setColorAt and picked up by MeshBasicMaterial
  // through the built-in instanceColor attribute.
  const tpGeo = new THREE.SphereGeometry(dotRadius, 8, 6);
  const tpMat = new THREE.MeshBasicMaterial();
  obsTpMesh = new THREE.InstancedMesh(tpGeo, tpMat, numTPs);
  obsTpMesh.frustumCulled = false;
  obsTpMesh.renderOrder = 1001;
  for (let i = 0; i < numTPs; i++) {
    obsTpMesh.setColorAt(i, _obsTpColor.set(0xffffff));
  }
  obsTpMesh.visible = false;     // openObserverPanel turns it on
  scene.add(obsTpMesh);

  // Worldline LineSegments: one segment per (particle, step). Buffer sized
  // for the worst case; setDrawRange caps how many segments are drawn each
  // frame. Per-vertex color encodes the segment's endpoint warp factor.
  const maxVerts = numTPs * numSteps * 2;
  const pathPos = new Float32Array(maxVerts * 3);
  const pathCol = new Float32Array(maxVerts * 3);
  const pathGeom = new THREE.BufferGeometry();
  pathGeom.setAttribute('position', new THREE.BufferAttribute(pathPos, 3));
  pathGeom.setAttribute('color',    new THREE.BufferAttribute(pathCol, 3));
  pathGeom.setDrawRange(0, 0);
  obsTpPathMesh = new THREE.LineSegments(pathGeom, new THREE.LineBasicMaterial({
    vertexColors: true, transparent: true,
    depthTest: false, depthWrite: false,
  }));
  obsTpPathMesh.frustumCulled = false;
  obsTpPathMesh.renderOrder = 1000;
  obsTpPathMesh.visible = false;
  scene.add(obsTpPathMesh);
  obsTpPathPos = pathPos;
  obsTpPathCol = pathCol;
}

// Per-frame: place each dot at its posHistory[obsViewStep] (offset+wrapped),
// color it by warp; rebuild path segments for k = 1..obsViewStep.
function updateObsTpMeshes() {
  if (!obsSim || !obsTpMesh || !obsTpPathMesh) return;
  const N = params.N, L = params.cubeSize;
  const half = 0.5 * L, s = L / N;
  const offX = params.offsetCells[0] * s;
  const offY = params.offsetCells[1] * s;
  const offZ = params.offsetCells[2] * s;
  const wrapJump = half;

  // Dots.
  const TPs = obsSim.testPoints;
  for (let i = 0; i < TPs.length; i++) {
    const tp = TPs[i];
    const idx = Math.min(obsViewStep, tp.posHistory.length - 1);
    const p = tp.posHistory[idx];
    const dx = (p[0] + offX) - L * Math.floor((p[0] + offX + half) / L);
    const dy = (p[1] + offY) - L * Math.floor((p[1] + offY + half) / L);
    const dz = (p[2] + offZ) - L * Math.floor((p[2] + offZ + half) / L);
    _obsTpMatrix.makeTranslation(dx, dy, dz);
    obsTpMesh.setMatrixAt(i, _obsTpMatrix);
    const aliveAtView = obsViewStep < tp.trail.length;
    if (aliveAtView) {
      _warpRgb(tp.trail[Math.min(obsViewStep, tp.trail.length - 1)].w, _obsRgb);
      _obsTpColor.setRGB(_obsRgb[0], _obsRgb[1], _obsRgb[2]);
    } else {
      _obsTpColor.setRGB(0.27, 0.27, 0.27);
    }
    obsTpMesh.setColorAt(i, _obsTpColor);
  }
  obsTpMesh.instanceMatrix.needsUpdate = true;
  if (obsTpMesh.instanceColor) obsTpMesh.instanceColor.needsUpdate = true;

  // Path segments. One segment per (particle, step k=1..effEnd), skipping
  // any that crossed a PBC wrap boundary (so worldlines cleanly break at
  // the cube faces, just like the observer worldline and streamlines).
  const cap = obsTpPathPos.length;
  let segCount = 0;
  for (let i = 0; i < TPs.length; i++) {
    const tp = TPs[i];
    const upTo = Math.min(obsViewStep, tp.posHistory.length - 1);
    for (let k = 1; k <= upTo; k++) {
      const p0 = tp.posHistory[k - 1];
      const p1 = tp.posHistory[k];
      const x0 = (p0[0] + offX) - L * Math.floor((p0[0] + offX + half) / L);
      const y0 = (p0[1] + offY) - L * Math.floor((p0[1] + offY + half) / L);
      const z0 = (p0[2] + offZ) - L * Math.floor((p0[2] + offZ + half) / L);
      const x1 = (p1[0] + offX) - L * Math.floor((p1[0] + offX + half) / L);
      const y1 = (p1[1] + offY) - L * Math.floor((p1[1] + offY + half) / L);
      const z1 = (p1[2] + offZ) - L * Math.floor((p1[2] + offZ + half) / L);
      if (Math.abs(x1 - x0) > wrapJump ||
          Math.abs(y1 - y0) > wrapJump ||
          Math.abs(z1 - z0) > wrapJump) continue;
      const off = segCount * 6;
      if (off + 6 > cap) break;
      obsTpPathPos[off    ] = x0; obsTpPathPos[off + 1] = y0; obsTpPathPos[off + 2] = z0;
      obsTpPathPos[off + 3] = x1; obsTpPathPos[off + 4] = y1; obsTpPathPos[off + 5] = z1;
      _warpRgb(tp.trail[Math.min(k, tp.trail.length - 1)].w, _obsRgb);
      const r = _obsRgb[0], gn = _obsRgb[1], bl = _obsRgb[2];
      obsTpPathCol[off    ] = r; obsTpPathCol[off + 1] = gn; obsTpPathCol[off + 2] = bl;
      obsTpPathCol[off + 3] = r; obsTpPathCol[off + 4] = gn; obsTpPathCol[off + 5] = bl;
      segCount++;
    }
  }
  obsTpPathMesh.geometry.setDrawRange(0, segCount * 2);
  obsTpPathMesh.geometry.attributes.position.needsUpdate = true;
  obsTpPathMesh.geometry.attributes.color.needsUpdate = true;
}

function drawObserverMap() {
  if (!obsSim || !obsCtx || !obsCanvas) return;
  const w = obsCanvas.width, h = obsCanvas.height;
  obsCtx.fillStyle = '#0a0d12';
  obsCtx.fillRect(0, 0, w, h);

  // Map extent: full grid corners (gridSize/2·√2) plus a margin.
  const mapHalf = obsSim.rMax * 1.15;
  const scale = Math.min(w, h) * 0.46 / mapHalf;
  const cx = w / 2, cy = h / 2;

  // Axes.
  obsCtx.strokeStyle = '#1a232f';
  obsCtx.lineWidth = 1;
  obsCtx.beginPath();
  obsCtx.moveTo(0, cy); obsCtx.lineTo(w, cy);
  obsCtx.moveTo(cx, 0); obsCtx.lineTo(cx, h);
  obsCtx.stroke();
  // Initial grid: square outline + faint cell lattice. The lattice marks
  // the test particles' starting positions in the observer's xy-plane.
  const gh = obsSim.gridSize * 0.5;
  const gN = obsSim.gridN;
  obsCtx.strokeStyle = '#1a232f';
  obsCtx.beginPath();
  for (let k = 0; k < gN; k++) {
    const t = -gh + k * (obsSim.gridSize / (gN - 1));
    obsCtx.moveTo(cx + t * scale, cy - gh * scale);
    obsCtx.lineTo(cx + t * scale, cy + gh * scale);
    obsCtx.moveTo(cx - gh * scale, cy + t * scale);
    obsCtx.lineTo(cx + gh * scale, cy + t * scale);
  }
  obsCtx.stroke();
  obsCtx.strokeStyle = '#2a3543';
  obsCtx.strokeRect(cx - gh * scale, cy - gh * scale,
                    obsSim.gridSize * scale, obsSim.gridSize * scale);

  // Trails up to obsViewStep. trail[k] = projected position at step k, so
  // we draw segments trail[i-1]→trail[i] for i = 1..effEnd, where effEnd
  // is min(obsViewStep, trail.length - 1). A test particle that died
  // before obsViewStep has a shorter trail; we draw all of it.
  obsCtx.lineWidth = 1.4;
  for (const tp of obsSim.testPoints) {
    const effEnd = Math.min(obsViewStep, tp.trail.length - 1);
    for (let i = 1; i <= effEnd; i++) {
      const p0 = tp.trail[i - 1], p1 = tp.trail[i];
      obsCtx.strokeStyle = _warpColor(p1.w);
      obsCtx.beginPath();
      obsCtx.moveTo(cx + p0.x * scale, cy + p0.y * scale);
      obsCtx.lineTo(cx + p1.x * scale, cy + p1.y * scale);
      obsCtx.stroke();
    }
  }
  // Endpoint dots: alive-at-view-step ⇔ trail has an entry at obsViewStep.
  for (const tp of obsSim.testPoints) {
    if (tp.trail.length === 0) continue;
    const aliveHere = obsViewStep < tp.trail.length;
    const idx = aliveHere ? obsViewStep : tp.trail.length - 1;
    const pt = tp.trail[idx];
    obsCtx.fillStyle = aliveHere ? _warpColor(pt.w) : '#444';
    obsCtx.beginPath();
    obsCtx.arc(cx + pt.x * scale, cy + pt.y * scale, aliveHere ? 2.5 : 1.5, 0, 2*Math.PI);
    obsCtx.fill();
  }

  // Observer at center.
  obsCtx.fillStyle = '#ffff66';
  obsCtx.beginPath();
  obsCtx.arc(cx, cy, 4, 0, 2*Math.PI);
  obsCtx.fill();

  // Status line. "view" reports the slider position; "computed" reports
  // how many steps the simulation has actually run so far.
  if (obsStatusEl) {
    let aliveAtView = 0;
    for (const tp of obsSim.testPoints) {
      if (obsViewStep < tp.trail.length) aliveAtView++;
    }
    const tau = obsViewStep * obsSim.dt;
    obsStatusEl.textContent =
      `view step ${obsViewStep} (τ=${tau.toFixed(2)}) · computed ${obsSim.step}/${obsSim.numSteps} · `
      + `${aliveAtView}/${obsSim.testPoints.length} alive at view  ·  red = test-particle time runs faster, blue = slower`;
  }
}

// Run one observer-time tick. If the user is auto-following the latest step
// (slider at max), bump the view step too.
function advanceObserverOneTick() {
  if (!obsSim || obsSim.step >= obsSim.numSteps) return;
  stepObserverSim();
  if (obsFollowLatest) obsViewStep = obsSim.step;
  syncObsTimeSlider();
  obsMapDirty = true;
}

// Mirror obsSim.step / obsViewStep into the slider's max + value attributes.
function syncObsTimeSlider() {
  if (!obsSim || !obsTimeSlider) return;
  obsTimeSlider.max = String(obsSim.step);
  if (obsFollowLatest) obsTimeSlider.value = String(obsViewStep);
}

// Slider event handler: clamp, mark dirty, update follow flag.
function setObsViewStep(v) {
  if (!obsSim) return;
  obsViewStep = Math.max(0, Math.min(obsSim.step, v | 0));
  obsFollowLatest = (obsViewStep === obsSim.step);
  obsMapDirty = true;
}

function openObserverPanel() {
  obsPanel.classList.add('active');
  if (obsMarker) obsMarker.visible = true;
  if (obsMarkerLine) obsMarkerLine.visible = true;
  if (obsTpMesh) obsTpMesh.visible = true;
  if (obsTpPathMesh) obsTpPathMesh.visible = true;
  // Start paused: the simulation is staged (test particles placed, observer
  // at the displayed-center cell) but no ticks are taken until the user
  // explicitly hits play or step.
  obsPaused = true;
  if (obsPlayBtn) obsPlayBtn.textContent = 'play';
  syncObsTimeSlider();
  resizeAll();
  rebuildObsWorldline();
  positionObsMarker();
  updateObsTpMeshes();
  drawObserverMap();
  obsMapDirty = false;
}
function closeObserverPanel() {
  obsPanel.classList.remove('active');
  obsSim = null;
  obsPosHistory = null;
  if (obsMarker) obsMarker.visible = false;
  if (obsMarkerLine) {
    obsMarkerLine.visible = false;
    obsMarkerLine.geometry.setDrawRange(0, 0);
  }
  if (obsTpMesh) {
    scene.remove(obsTpMesh);
    obsTpMesh.geometry.dispose();
    obsTpMesh = null;
  }
  if (obsTpPathMesh) {
    scene.remove(obsTpPathMesh);
    obsTpPathMesh.geometry.dispose();
    obsTpPathMesh = null;
  }
  obsTpPathPos = null;
  obsTpPathCol = null;
  if (obsTimeSlider) {
    obsTimeSlider.max = '0';
    obsTimeSlider.value = '0';
  }
  resizeAll();
}

// Resize the main 3D viewport and (if active) the observer canvas. Replaces
// the simple window-resize handler that was here before.
function resizeAll() {
  const obsActive = !!obsSim;
  const mainW = obsActive ? Math.floor(innerWidth / 2) : innerWidth;
  renderer.setSize(mainW, innerHeight);
  camera.aspect = mainW / innerHeight;
  camera.updateProjectionMatrix();
  if (obsActive && obsCanvas) {
    const r = obsCanvas.getBoundingClientRect();
    obsCanvas.width  = Math.max(1, Math.floor(r.width));
    obsCanvas.height = Math.max(1, Math.floor(r.height));
    drawObserverMap();
  }
}

// Set each voxel's per-instance matrix to scale·translate. Cheap (one matrix
// per cell) so safe to call from a slider's input event whenever voxelScale
// or the grid spacing changes.
function updateVoxelTransforms() {
  if (!voxelMesh || !state) return;
  const total = params.N * params.N * params.N;
  const L = params.cubeSize;
  const half = 0.5 * L;
  const s = L / params.N;
  const sz = s * params.voxelScale;
  const offX = params.offsetCells[0] * s;
  const offY = params.offsetCells[1] * s;
  const offZ = params.offsetCells[2] * s;
  for (let i = 0; i < total; i++) {
    let px = state.positions[3*i    ] + offX;
    let py = state.positions[3*i + 1] + offY;
    let pz = state.positions[3*i + 2] + offZ;
    px -= L * Math.floor((px + half) / L);
    py -= L * Math.floor((py + half) / L);
    pz -= L * Math.floor((pz + half) / L);
    _voxelMatrix.makeScale(sz, sz, sz);
    _voxelMatrix.setPosition(px, py, pz);
    voxelMesh.setMatrixAt(i, _voxelMatrix);
  }
  voxelMesh.instanceMatrix.needsUpdate = true;
}

// Per-cell color + alpha. Two voxel modes:
//   heat:    color=blue→red by misalignment t, alpha=t^γ (linear default).
//            Aligned cells fade out; defects pop opaque red.
//   domains: color=HSL from the cell's +Z direction (hue=azimuth atan2(y,x),
//            saturation=horiz-component, lightness=elevation z), alpha=
//            (1−t)^γ. Aligned cells stay opaque in their direction colour;
//            misaligned cells (domain walls / defects) fade out, so the
//            visualization reads as colored blobs of aligned domains.
function updateVoxelColors() {
  fillCellMisalignment(state, voxelMisalignBuf);
  const total = voxelMisalignBuf.length;
  const inv = 1 / Math.max(0.01, params.misalignCap);
  const gamma = params.alphaGamma;
  const linearGamma = Math.abs(gamma - 1) < 1e-6;
  const TWO_PI_INV = 1 / (2 * Math.PI);
  if (params.renderMode === 'domains') {
    for (let i = 0; i < total; i++) {
      let t = voxelMisalignBuf[i] * inv;
      if (t > 1) t = 1;
      const dx = dirsBuf[3*i    ];
      const dy = dirsBuf[3*i + 1];
      const dz = dirsBuf[3*i + 2];
      // Azimuth → hue. Equatorial directions get full saturation; near the
      // poles (dz → ±1) saturation drops, and we use lightness to tell +Z
      // (lighter) from −Z (darker) since their azimuth degenerates to 0.
      let hue = Math.atan2(dy, dx) * TWO_PI_INV;
      if (hue < 0) hue += 1;
      const sat = Math.sqrt(dx*dx + dy*dy);
      const lum = 0.30 + 0.20 * (dz + 1);
      _voxelColor.setHSL(hue, sat, lum);
      voxelMesh.setColorAt(i, _voxelColor);
      const u = 1 - t;
      voxelAlphaBuf[i] = linearGamma ? u : Math.pow(u, gamma);
    }
  } else {
    // heat mode (default): misalignment-driven color and alpha.
    for (let i = 0; i < total; i++) {
      let t = voxelMisalignBuf[i] * inv;
      if (t > 1) t = 1;
      _voxelColor.setHSL(0.66 * (1 - t), 0.85, 0.18 + 0.42 * t);
      voxelMesh.setColorAt(i, _voxelColor);
      voxelAlphaBuf[i] = linearGamma ? t : Math.pow(t, gamma);
    }
  }
  voxelMesh.instanceColor.needsUpdate = true;
  voxelMesh.geometry.attributes.instanceAlpha.needsUpdate = true;
}

// Show the mesh that matches the current render mode; hide the other. Both
// voxel modes (heat, domains) share the same InstancedMesh — only the
// per-instance color + alpha differ — so they have the same visibility
// rules. .mode-voxel is shown for either of them.
function applyRenderMode() {
  const m = params.renderMode;
  const isVoxel = m === 'heat' || m === 'domains';
  if (lines)     lines.visible     = m === 'axes';
  if (voxelMesh) voxelMesh.visible = isVoxel;
  for (const el of document.querySelectorAll('.mode-axes'))
    el.style.display = m === 'axes' ? '' : 'none';
  for (const el of document.querySelectorAll('.mode-voxel'))
    el.style.display = isVoxel ? '' : 'none';
}

const statsEl = document.getElementById('stats');
let frame = 0, fpsTick = performance.now(), fps = 0;
let lastMisalignTick = 0, lastMisalign = 0;

function animate() {
  requestAnimationFrame(animate);
  if (!paused) {
    if (gpuAligner) {
      // All steps stay on GPU; one readPixels per frame brings the field
      // back so the CPU-side visualization (voxel colors, axes, histogram)
      // sees the freshest state.
      for (let s = 0; s < params.stepsPerFrame; s++) {
        gpuAligner.step(params.eta, params.noise);
      }
      gpuAligner.readBack(state.quats);
    } else {
      for (let s = 0; s < params.stepsPerFrame; s++) {
        stepAlign(state, params.eta, params.noise);
      }
    }
  }
  if (obsSim) {
    // Auto-step while alignment+observer are both un-paused. (The "step"
    // button calls advanceObserverOneTick directly.)
    if (paused && !obsPaused && obsSim.step < obsSim.numSteps) {
      advanceObserverOneTick();
    }
    // Worldline + 3D marker + test-particle meshes rebuild every frame:
    // cheap (~num_steps × num_particles segment writes), and that way an
    // x/y/z cube shift or a slider scrub takes effect immediately without
    // separate dirty flags for them.
    rebuildObsWorldline();
    positionObsMarker();
    updateObsTpMeshes();
    if (obsMapDirty) {
      drawObserverMap();
      obsMapDirty = false;
    }
  }
  // Fill +Z directions first — they feed both the histogram and the
  // domain-mode voxel coloring (hue from azimuth, lightness from elevation).
  fillZDirections(state, dirsBuf);
  if (params.renderMode === 'axes') {
    fillAxesGeometry(state, params.axisLen, axesBuf, params.offsetCells);
    lineGeom.attributes.position.needsUpdate = true;
  } else {
    updateVoxelColors();
  }
  updatePaths();
  hist.update(dirsBuf, params.N * params.N * params.N);
  hist.syncCamera(camera);
  controls.update();
  renderer.render(scene, camera);
  hist.render();

  frame++;
  const now = performance.now();
  if (now - fpsTick > 500) {
    fps = (frame * 1000 / (now - fpsTick)) | 0;
    frame = 0; fpsTick = now;
    // meanNeighborMisalignment is O(N³) — refresh it less often than the FPS
    // counter to keep the cost down on big grids.
    if (now - lastMisalignTick > 1000) {
      lastMisalign = meanNeighborMisalignment(state);
      lastMisalignTick = now;
    }
    const total = params.N ** 3;
    const o = params.offsetCells;
    statsEl.textContent =
      `${total} frames · ${fps} fps · η=${params.eta.toFixed(2)} · `
      + `noise=${params.noise.toFixed(3)} · `
      + `misalign=${lastMisalign.toFixed(3)} · `
      + `offset=(${o[0]},${o[1]},${o[2]})`;
  }
}

addEventListener('resize', resizeAll);

buildScene();
rebuildCube();
rebuildGrid();
buildPaths();
hist = createDirectionHistogram(document.getElementById('histCanvas'));

// UI bindings. `change` (vs `input`) lets us cheap-update params on every
// keystroke but only rebuild the heavy bits when the user commits the value.
function bindNumber(id, key, after) {
  const el = document.getElementById(id);
  el.value = params[key];
  el.addEventListener('input', () => {
    const v = parseFloat(el.value);
    if (Number.isFinite(v)) params[key] = v;
  });
  if (after) el.addEventListener('change', after);
}
function bindRange(id, key) {
  const el = document.getElementById(id);
  el.value = params[key];
  el.addEventListener('input', () => { params[key] = parseFloat(el.value); });
}

bindNumber('N',             'N',             () => { rebuildGrid(); });
bindNumber('cubeSize',      'cubeSize',      () => { rebuildCube(); rebuildGrid(); });
bindNumber('stepsPerFrame', 'stepsPerFrame');
bindRange('eta',     'eta');
bindRange('noise',   'noise');
bindRange('axisLen', 'axisLen');
bindRange('voxelScale', 'voxelScale');
bindRange('misalignCap', 'misalignCap');
bindRange('alphaGamma', 'alphaGamma');
bindRange('pathSeeds', 'pathSeeds');
bindRange('pathStepFrac', 'pathStepFrac');
bindRange('obsGridSize', 'obsGridSize');
bindNumber('obsGridN', 'obsGridN');
bindRange('obsDt', 'obsDt');
bindNumber('obsTotalTime', 'obsTotalTime');

const showPathsEl = document.getElementById('showPaths');
showPathsEl.checked = params.showPaths;
showPathsEl.addEventListener('change', () => {
  params.showPaths = showPathsEl.checked;
  applyPathsUI();
});
applyPathsUI();

// voxelScale needs to push the new size into every instance matrix; the
// other range bindings just twiddle params consumed by per-frame updates.
document.getElementById('voxelScale').addEventListener('input', updateVoxelTransforms);

const renderModeEl = document.getElementById('renderMode');
renderModeEl.value = params.renderMode;
renderModeEl.addEventListener('change', () => {
  params.renderMode = renderModeEl.value;
  applyRenderMode();
});
applyRenderMode();   // sync UI visibility with the initial mode

document.getElementById('resetBtn').onclick = () => rebuildGrid();
document.getElementById('pauseBtn').onclick = (e) => {
  paused = !paused;
  e.target.textContent = paused ? 'play' : 'pause';
  document.getElementById('simulateBtn').disabled = !paused;
  // Closing the observer panel on un-pause avoids the surprising case where
  // the alignment field starts mutating under a running observer simulation.
  if (!paused && obsSim) closeObserverPanel();
};
document.getElementById('randBtn').onclick = () => {
  randomizeAlignGrid(state);
  if (gpuAligner) gpuAligner.upload(state.quats);
};

// Observer panel wiring.
obsPanel = document.getElementById('obsPanel');
obsCanvas = document.getElementById('obsCanvas');
obsCtx = obsCanvas.getContext('2d');
obsStatusEl = document.getElementById('obsStatus');
obsPlayBtn = document.getElementById('obsPlayBtn');
obsTimeSlider = document.getElementById('obsTimeSlider');
const simulateBtn = document.getElementById('simulateBtn');
simulateBtn.disabled = !paused;
simulateBtn.onclick = () => {
  if (!paused) return;
  setupObserverSim();
  openObserverPanel();
};
document.getElementById('closeObsBtn').onclick = closeObserverPanel;
obsPlayBtn.onclick = () => {
  obsPaused = !obsPaused;
  obsPlayBtn.textContent = obsPaused ? 'play' : 'pause';
};
document.getElementById('obsStepBtn').onclick = () => {
  // Manual step always lands at the new latest state (re-enables follow).
  obsFollowLatest = true;
  advanceObserverOneTick();
};
obsTimeSlider.addEventListener('input', () => {
  setObsViewStep(parseInt(obsTimeSlider.value, 10));
});

// GPU toggle: switching off pulls the latest field back from the texture
// into state.quats so subsequent CPU stepAlign continues from the right
// place. Switching on re-uploads the current CPU state.
const useGPUEl = document.getElementById('useGPU');
useGPUEl.checked = params.useGPU;
useGPUEl.addEventListener('change', () => {
  params.useGPU = useGPUEl.checked;
  if (params.useGPU) {
    tryEnableGPU();
  } else if (gpuAligner) {
    gpuAligner.readBack(state.quats);
    gpuAligner.dispose();
    gpuAligner = null;
  }
});

// Refine: double N and copy each old cell to the 2×2×2 block of new cells
// it sits inside. The simulation continues from the (now-finer) field
// instead of restarting from random — useful for letting a coarse
// near-converged state seed a high-resolution refinement.
document.getElementById('refineBtn').onclick = () => {
  const oldN = params.N;
  const newN = oldN * 2;
  if (newN > 128) return;     // matches the N input's max
  // Snapshot before rebuildGrid (which re-allocates state.quats).
  const oldQuats = new Float32Array(state.quats);
  params.N = newN;
  document.getElementById('N').value = String(newN);
  rebuildGrid();
  // Upscale: new cell (ix, iy, iz) inherits from old (⌊ix/2⌋, ⌊iy/2⌋, ⌊iz/2⌋).
  const newQuats = state.quats;
  for (let iz = 0; iz < newN; iz++) {
    for (let iy = 0; iy < newN; iy++) {
      for (let ix = 0; ix < newN; ix++) {
        const iN = (iz * newN + iy) * newN + ix;
        const iO = ((iz >> 1) * oldN + (iy >> 1)) * oldN + (ix >> 1);
        newQuats[4*iN    ] = oldQuats[4*iO    ];
        newQuats[4*iN + 1] = oldQuats[4*iO + 1];
        newQuats[4*iN + 2] = oldQuats[4*iO + 2];
        newQuats[4*iN + 3] = oldQuats[4*iO + 3];
      }
    }
  }
  if (gpuAligner) gpuAligner.upload(state.quats);
};

// Keyboard: x/y/z shift the displayed grid by one cell along that cube axis;
// Shift+x/y/z reverses the direction. PBC means this is purely visual — the
// simulation state and neighbor topology don't change. Voxels need an
// instance-matrix update right away; axes pick up the new offset on the
// next frame's fillAxesGeometry call.
addEventListener('keydown', (e) => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const tag = e.target && e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  let dx = 0, dy = 0, dz = 0;
  switch (e.key) {
    case 'x': dx =  1; break;
    case 'X': dx = -1; break;
    case 'y': dy =  1; break;
    case 'Y': dy = -1; break;
    case 'z': dz =  1; break;
    case 'Z': dz = -1; break;
    default: return;
  }
  e.preventDefault();
  const N = params.N;
  params.offsetCells[0] = ((params.offsetCells[0] + dx) % N + N) % N;
  params.offsetCells[1] = ((params.offsetCells[1] + dy) % N + N) % N;
  params.offsetCells[2] = ((params.offsetCells[2] + dz) % N + N) % N;
  updateVoxelTransforms();
});

animate();
</script>
</body>
</html>
